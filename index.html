// Baender-Kombinations-Rechner (seit v1.29.0): das SmartWorkout-Elite-Set hat genau diese 7
// Baender (2x 25kg, 2x 20kg, je 1x 15/10/5kg). Findet per Brute-Force (nur 2^7=128 Teilmengen,
// trivial schnell) die Kombination, deren Summe dem Zielgewicht am naechsten kommt - bei
// Gleichstand die mit weniger Baendern (einfacher zu greifen). Nur fuer den baender-Plan relevant.
const BAND_WEIGHTS = [25, 25, 20, 20, 15, 10, 5];

function findBandCombination(targetKg) {
  const n = BAND_WEIGHTS.length;
  let best = null;
  for (let mask = 1; mask < (1 << n); mask++) {
    let sum = 0;
    const combo = [];
    for (let i = 0; i < n; i++) {
      if (mask & (1 << i)) { sum += BAND_WEIGHTS[i]; combo.push(BAND_WEIGHTS[i]); }
    }
    const diff = Math.abs(sum - targetKg);
    if (!best || diff < best.diff || (diff === best.diff && combo.length < best.combo.length)) {
      best = { sum, combo: combo.slice().sort((a, b) => b - a), diff };
    }
  }
  return best;
}

// Geteilt zwischen Kartenansicht und Fokusmodus (wie setsRowsHTML/exerciseInfoPanelHTML),
// damit "Letztes Mal" und der Gewichtsvorschlag-Chip in beiden Ansichten identisch sind.
function historyLineHTML(exId, hist) {
  const historyPart = hist
    ? `Letztes Mal: <b>${escapeAttr(hist.weight || "–")}kg × ${escapeAttr(hist.reps || "–")}</b> <span>(${escapeAttr(hist.date)})</span>`
    : "";
  const suggestion = getWeightSuggestion(exId);
  let suggestionPart = "";
  if (suggestion) {
    let bandHint = "";
    if (state.currentPlan === "baender") {
      const best = findBandCombination(Number(suggestion.weight));
      if (best) bandHint = ` <span class="band-combo-hint">(${best.combo.join("+")}kg)</span>`;
    }
    suggestionPart = `<span class="weight-suggestion">💡 Vorschlag: <b>${escapeAttr(String(suggestion.weight))}kg</b>${bandHint} <button class="suggestion-accept-btn" data-role="suggestion-accept" data-exid="${escapeAttr(exId)}">Übernehmen</button></span>`;
  }
  if (!historyPart && !suggestionPart) return "";
  return `<div class="history-line">${historyPart}${suggestionPart}</div>`;
}

// "Wird zur uebernaechsten Uebung": Queue [A,B,C,D], Fokus auf A (focusPos=0), Skip von A
// -> Ziel [B,C,A,D] - B wird sofort sichtbar, C bleibt "als Naechstes", A taucht danach
// wieder auf. Bei nur noch 2 verbleibenden Uebungen landet die geskippte Uebung am Ende
// (kein Platz fuer "uebernaechste").
function skipCurrent() {
  const [skipped] = focusQueue.splice(focusPos, 1);
  const insertAt = Math.min(focusPos + 2, focusQueue.length);
  focusQueue.splice(insertAt, 0, skipped);
}

function renderFocusMode() {
  const day = state.currentDay;
  const dayMeta = DAYS.find(d => d.id === day);
  const exId = focusQueue[focusPos];
  const ex = findExerciseById(day, exId);
  const swapKey = `${day}:${ex.id}`;
  const displayName = state.swaps[swapKey] || ex.name;
  const sets = getSetsFor(day, ex);
  const doneCount = sets.filter(s => s.done && !s.isWarmup).length;
  // Seit v1.53.0: faellt auf einen anderen Plan-Slot derselben realen Uebung zurueck, wenn hier
  // noch keine eigene Historie existiert - siehe findCrossPlanHistoryEntry().
  const hist = getHistoryEntry(ex.id) || findCrossPlanHistoryEntry(day, ex);
  const note = state.notes[swapKey] || "";
  const info = exerciseLibrary[ex.libraryId];
  const infoPanelHTML = info && focusInfoOpen ? exerciseInfoPanelHTML(ex) : "";
  const swapPanelContent = focusSwapOpen ? swapPanelHTML(day, ex, swapKey) : "";

  const historyHTML = historyLineHTML(ex.id, hist);

  const isLast = focusPos >= focusQueue.length - 1;
  const nextEx = !isLast ? findExerciseById(day, focusQueue[focusPos + 1]) : null;
  const nextDisplayName = nextEx ? (state.swaps[`${day}:${nextEx.id}`] || nextEx.name) : null;

  const nextHTML = nextEx
    ? `<div class="focusmode-next">Als Nächstes: <b>${escapeAttr(nextDisplayName)}</b></div>`
    : `<div class="focusmode-next">Letzte Übung dieser Einheit</div>`;

  const nextBtnHTML = isLast
    ? `<button class="focusmode-nav-btn finish" data-role="finish" data-day="${day}">✓ Training abschließen</button>`
    : `<button class="focusmode-nav-btn primary" data-role="focus-next">Weiter →</button>`;

  return `
    <div class="focusmode-topbar">
      <button class="focusmode-exit-btn" data-role="focus-exit">✕ Verlassen</button>
      <span class="focusmode-progress">${focusPos + 1}/${focusQueue.length} · ${dayMeta.label}</span>
    </div>
    <div class="focusmode-content">
      ${planBuilderExerciseNamesDatalist()}
      <div class="card">
        <div class="card-top focusmode-top">
          <div style="min-width:0;">
            <div class="focusmode-title-row">
              <h2 class="focusmode-title">${displayName}</h2>
              ${ex.core ? '<span class="badge-core">CORE</span>' : ""}
              ${state.swaps[swapKey] ? `<span class="badge-swapped">statt ${ex.name}</span>` : ""}
            </div>
            <div class="focusmode-target">${ex.sets} Sätze × ${ex.reps} Wdh.</div>
            ${historyHTML}
          </div>
          <div class="focusmode-top-actions">
            ${info ? `<button class="swap-btn" title="Übung erklären" data-role="focus-info-toggle">ℹ</button>` : ""}
            <button class="swap-btn" title="Übung tauschen" data-role="focus-swap-toggle">⟲</button>
            <button class="swap-btn ${focusEditOpen ? "active" : ""}" title="${focusEditOpen ? "Bearbeiten beenden" : "Erledigte Sätze bearbeiten"}" data-role="focus-edit-toggle">✎</button>
          </div>
        </div>
        ${infoPanelHTML}
        ${swapPanelContent}
        ${setsRowsHTML(day, ex, sets, focusEditOpen)}
        <div class="set-footer">
          ${tallyHTML(doneCount)}
          <span class="set-count">${doneCount}/${ex.sets} Arbeitssätze</span>
        </div>
        <textarea class="note-input" rows="1" placeholder="Notiz (Technik, Schmerzen, Griffweite …)"
          data-role="note" data-day="${day}" data-exid="${ex.id}">${note}</textarea>
      </div>
      ${nextHTML}
      <div class="focusmode-nav">
        <button class="focusmode-nav-btn" data-role="focus-prev" ${focusPos === 0 ? "disabled" : ""}>← Zurück</button>
        <button class="focusmode-nav-btn" data-role="focus-skip">Überspringen ⇥</button>
        ${nextBtnHTML}
      </div>
    </div>
  `;
}

// Seit v1.31.0: plottet das geschaetzte 1RM statt des rohen Satzgewichts, damit ein leichterer
// Satz mit mehr Wiederholungen nicht faelschlich wie ein Rueckschritt aussieht. sparklineSVG()
// liest weiterhin nur p.weight - Feldname bewusst unveraendert gelassen, keine Aenderung dort noetig.
function journalPointsFor(exId) {
  const points = [];
  state.journal.forEach(entry => {
    entry.exercises.forEach(ex => {
      if (ex.exId !== exId) return;
      ex.sets.forEach(s => {
        if (s.isWarmup) return;
        const weight = parseWeightNum(s.weight);
        if (!Number.isFinite(weight)) return;
        points.push({ weight: estimateOneRepMax(weight, s.reps), timestamp: entry.timestamp });
      });
    });
  });
  points.sort((a, b) => a.timestamp - b.timestamp);
  return points;
}

// Streak-Zaehler (seit v1.37.0): zaehlt aufeinanderfolgende KALENDERWOCHEN (Mo-So) mit
// mindestens einer abgeschlossenen Einheit, bewusst NICHT aufeinanderfolgende Kalendertage - bei
// einem Push/Pull/Legs-artigen Split mit eingeplanten Ruhetagen waere ein taeglicher Streak fast
// nie am Leben und wuerde normale, eingeplante Ruhetage faelschlich als "Serie gebrochen" werten.
function computeTrainingStreaks() {
  if (state.journal.length === 0) return { current: 0, best: 0 };
  const weeksWithTraining = new Set(
    state.journal.map(entry => getWeekStart(new Date(entry.timestamp)).getTime())
  );
  const sortedWeeks = Array.from(weeksWithTraining).sort((a, b) => a - b);
  const weekMs = 7 * 24 * 60 * 60 * 1000;

  let best = 1;
  let run = 1;
  for (let i = 1; i < sortedWeeks.length; i++) {
    run = sortedWeeks[i] - sortedWeeks[i - 1] === weekMs ? run + 1 : 1;
    best = Math.max(best, run);
  }

  // Rueckwaerts von der laufenden Woche aus zaehlen. Fehlt nur die laufende, noch unvollstaendige
  // Woche, bleibt die Serie bis zur letzten abgeschlossenen Woche trotzdem gueltig.
  const currentWeekStart = getWeekStart(new Date()).getTime();
  let current = 0;
  let cursor = weeksWithTraining.has(currentWeekStart) ? currentWeekStart : currentWeekStart - weekMs;
  while (weeksWithTraining.has(cursor)) {
    current++;
    cursor -= weekMs;
  }

  return { current, best };
}

function streakHTML() {
  const { current, best } = computeTrainingStreaks();
  if (current === 0 && best === 0) return "";
  const weekWord = (n) => (n === 1 ? "Woche" : "Wochen");
  return `
    <div class="streak-banner">
      <span>🔥 ${current} ${weekWord(current)} in Folge trainiert</span>
      ${best > current ? `<span class="streak-best">Beste Serie: ${best} ${weekWord(best)}</span>` : ""}
    </div>
  `;
}

function journalHistoryHTML() {
  if (state.journal.length === 0) {
    return `<div class="journal-empty">Noch keine abgeschlossenen Einheiten im Tagebuch.</div>`;
  }
  // Seit v1.50.0 (Nachtragen mit editierbarem Datum) kann die Einfuegereihenfolge vom
  // chronologischen Datum abweichen (ein spaeter nachgetragener Eintrag kann ein frueheres Datum
  // haben als bereits vorhandene Eintraege) - .reverse() allein (Einfuegereihenfolge) reichte
  // vorher, weil neue Eintraege immer "jetzt" datiert waren. Explizit nach timestamp absteigend
  // sortieren, damit "neueste zuerst" wieder das tatsaechliche Datum meint, nicht nur die
  // Reihenfolge des Abschliessens.
  return streakHTML() + [...state.journal].sort((a, b) => b.timestamp - a.timestamp).map(entry => {
    const gym = entry.gymId ? state.gyms.find(g => g.id === entry.gymId) : null;
    const exercisesHTML = entry.exercises.map(ex => {
      const setsText = ex.sets.map(s => {
        const label = `${escapeAttr(s.weight || "–")}kg×${escapeAttr(s.reps || "–")}`;
        return s.isWarmup ? `<i>${label}</i>` : label;
      }).join(", ");
      return `<div class="journal-ex-line"><b>${escapeAttr(ex.name)}:</b> ${setsText}</div>`;
    }).join("");
    const wellbeingEmoji = { good: "😊", ok: "😐", bad: "😖" }[entry.wellbeing] || "";
    return `
      <div class="card">
        <div class="journal-entry-header">
          <div>
            <span class="journal-entry-date">${escapeAttr(entry.date)}</span>
            <span class="journal-entry-day">${escapeAttr(entry.dayLabel)}${gym ? ` · ${escapeAttr(gym.name)}` : ""}${wellbeingEmoji ? ` ${wellbeingEmoji}` : ""}</span>
          </div>
          <button class="journal-entry-delete" data-role="journal-delete-entry" data-timestamp="${entry.timestamp}" title="Eintrag löschen">🗑</button>
        </div>
        ${exercisesHTML}
        ${entry.sessionNote ? `<div class="journal-session-note">📝 ${escapeAttr(entry.sessionNote)}</div>` : ""}
      </div>
    `;
  }).join("");
}

function journalRecordsHTML() {
  const records = computePersonalRecords();
  const exIds = Object.keys(records).sort((a, b) => records[b].timestamp - records[a].timestamp);
  if (exIds.length === 0) {
    return `<div class="journal-empty">Noch keine Rekorde — schließe ein paar Trainingseinheiten ab.</div>`;
  }
  return exIds.map(exId => {
    const rec = records[exId];
    const e1rmRounded = Math.round(rec.e1rm * 10) / 10;
    return `
      <div class="card">
        <div class="journal-record-header">
          <h3>${escapeAttr(rec.name)}</h3>
          <span class="journal-record-pr">≈${escapeAttr(String(e1rmRounded))}kg 1RM <span class="journal-record-date">(${escapeAttr(rec.date)})</span></span>
        </div>
        <div class="journal-record-detail">aus ${escapeAttr(String(rec.weight))}kg × ${escapeAttr(rec.reps || "–")}</div>
        ${sparklineSVG(journalPointsFor(exId))}
      </div>
    `;
  }).join("");
}

function journalVolumeHTML() {
  const { counts, unattributed } = computeWeeklyVolume();
  const trend = computeVolumeTrend();
  const maxScale = 24; // etwas ueber dem oberen Zielwert (20), damit der Balken nicht abgeschnitten wirkt
  const targetMinPct = (12 / maxScale) * 100;
  const targetMaxPct = (20 / maxScale) * 100;
  const rows = MUSCLE_GROUPS.map(group => {
    const n = counts[group];
    const pct = Math.min(100, (n / maxScale) * 100);
    const status = n < 12 ? "low" : n <= 20 ? "ok" : "high";
    const statusLabel = { low: "niedrig", ok: "im Zielbereich", high: "hoch" }[status];
    // Trend ueber die letzten VOLUME_TREND_WEEKS Wochen fuer diese Muskelgruppe - sparklineSVG()
    // ist generisch genug (liest nur .weight/.timestamp), um sie unveraendert wiederzuverwenden,
    // genau wie schon bei den Rekorden/e1RM.
    const trendPoints = trend.map(w => ({ weight: w.counts[group], timestamp: w.weekStart.getTime() }));
    const hasTrendData = trendPoints.some(p => p.weight > 0);
    const trendHTML = hasTrendData
      ? `<div class="volume-row-trend">${sparklineSVG(trendPoints)}</div>`
      : "";
    return `
      <div class="volume-row">
        <div class="volume-row-top">
          <span class="volume-row-label">${escapeAttr(group)}</span>
          <span class="volume-row-count">${n} Sätze · <span class="volume-status volume-status-${status}">${statusLabel}</span></span>
        </div>
        <div class="volume-row-bar">
          <div class="volume-row-target" style="left:${targetMinPct}%; width:${targetMaxPct - targetMinPct}%"></div>
          <div class="volume-row-fill volume-fill-${status}" style="width:${pct}%"></div>
        </div>
        ${trendHTML}
      </div>
    `;
  }).join("");
  const unattributedHTML = unattributed > 0
    ? `<div class="journal-empty">${unattributed} in den letzten 7 Tagen erfasste(r) Satz/Sätze ohne zuordenbare Muskelgruppe (z.B. aus einer gelöschten oder bearbeiteten eigenen Übung).</div>`
    : "";
  return `
    <div class="volume-hint">Zielbereich (heller Balkenbereich): 12–20 Sätze pro Muskelgruppe in den letzten 7 Tagen — Richtwert für trainierte Sportler. Die kleine Linie unter jedem Balken zeigt den Verlauf der letzten ${VOLUME_TREND_WEEKS} 7-Tage-Fenster.</div>
    ${rows}
    ${unattributedHTML}
  `;
}

// Ruft den Admin-Endpunkt des Cloudflare-Workers auf (ADMIN_API_URL, gleicher Worker wie
// PROXY_URL, eigener Pfad). Haengt den Firebase-ID-Token als Authorization-Header an - das ist
// der Beleg, den der Worker serverseitig gegen ADMIN_EMAIL prueft (siehe dortiger Kommentar).
async function callAdminApi(action, extra) {
  if (!window.FretzeCloud) throw new Error("Gerade nicht verfügbar (offline?)");
  const idToken = await window.FretzeCloud.getIdToken();
  if (!idToken) throw new Error("Nicht eingeloggt.");
  const res = await fetch(ADMIN_API_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json", Authorization: `Bearer ${idToken}` },
    body: JSON.stringify({ action, ...extra }),
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `Fehler (${res.status})`);
  return data;
}

    ? "Noch keine Physio-Einheit erfasst."
    : due
      ? `🩺 Fällig seit ${daysSince - state.physio.intervalDays} Tag(en) (zuletzt vor ${daysSince} Tagen)`
      : `Zuletzt vor ${daysSince} Tag(en) — noch ${state.physio.intervalDays - daysSince} Tag(e) bis zur nächsten Einheit`;

  const hasExercises = state.physio.exercises.length > 0;
  const cardsHTML = hasExercises ? state.physio.exercises.map(physioExerciseCardHTML).join("") : "";
  const emptyHint = hasExercises ? "" : `<p class="dim">Noch keine Physio-Übungen angelegt. Über "⚙ Übungen verwalten" hinzufügen.</p>`;

  return `
    <div class="focusmode-topbar">
      <button class="focusmode-exit-btn" data-role="physio-exit">✕ Schließen</button>
      <span class="focusmode-progress">🩺 Physio</span>

      ${emptyHint}
      ${cardsHTML}
      ${hasExercises ? `<button class="finish-btn" data-role="finish-physio">✓ Physio abschließen</button>` : ""}
    </div>
  `;
}

// KI-Trainingsplan-Chat (seit v1.47.0): Fitness-Trainer-Interview per Chat, das am Ende einen
// Plan liefert. Der generierte Plan wird NICHT ueber eine eigene Vorschau-UI gezeigt, sondern

// wiederverwendet, keine neue UI dafuer noetig.

// Seit v1.59.0 aus dem ai-plan-chat-enter-Klick-Handler herausgezogen - wird jetzt auch von der

function startAiPlanChat() {
  // Seit v1.48.0: Login-Pflicht (kostet Geld pro Gemini-Aufruf) - serverseitig im Worker

  if (!currentUser) {

  aiPlanLoading = false;

function renderAiPlanChatView() {

// Baut aus der KI-Antwort ein state.planDraft-Objekt und prueft es mit dem bestehenden,
// unveraenderten validatePlanDraft() (keine Duplizierung der Regeln) - bei Erfolg oeffnet sich
// der bestehende Plan-Builder zum Review/Bearbeiten/Speichern, bei Misserfolg bleibt der Chat
// offen. libraryIdForName() verknuepft Uebungen automatisch mit der Datenbank, wenn die KI einen
// Namen exakt aus der mitgeschickten Liste uebernommen hat (gleiche Kulanz wie im Plan-Builder).
function applyAiGeneratedPlan(aiPlan) {
  if (!aiPlan || typeof aiPlan.label !== "string" || !Array.isArray(aiPlan.days)) return false;
  const draft = {
    editingPlanId: null,
    label: aiPlan.label,
    days: aiPlan.days.map(d => ({
      label: typeof d?.label === "string" ? d.label : "Tag",
      exercises: Array.isArray(d?.exercises) ? d.exercises.map(ex => {
        const name = typeof ex?.name === "string" ? ex.name : "";
        const matchedId = name ? libraryIdForName(name) : null;
        return {
          name,
          sets: Number(ex?.sets) || 3,
          reps: typeof ex?.reps === "string" ? ex.reps : "8-10",
          ...(matchedId ? { libraryId: matchedId } : {}),
        };
      }) : [],
    })),
  };
  if (!validatePlanDraft(draft)) return false;
  state.planDraft = draft;
  planBuilderActive = true;
  aiPlanChatActive = false;
  persist();
  render();
  return true;
}

async function sendAiPlanChatMessage(text) {
  aiPlanMessages.push({ role: "user", text });
  aiPlanLoading = true;
  render();
  try {
    // Seit v1.48.0: Login-Pflicht (siehe render-Gate bei ai-plan-chat-enter/Worker) - hier
    // trotzdem defensiv geprueft, falls dieser Pfad je ohne das UI-Gate erreicht wird.
    const idToken = currentUser && window.FretzeCloud ? await window.FretzeCloud.getIdToken() : null;
    if (!idToken) throw new Error("Bitte einloggen, um den KI-Trainingsplan-Chat zu nutzen.");
    const res = await fetch(AI_PLAN_CHAT_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${idToken}` },
      body: JSON.stringify({
        messages: aiPlanMessages,
        exerciseNames: Object.values(exerciseLibrary).map(e => e.name),
      }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `Fehler (${res.status})`);
    aiPlanLoading = false;
    if (data.type === "question" && typeof data.text === "string") {
      aiPlanMessages.push({ role: "model", text: data.text });
      render();
    } else if (data.type === "plan") {
      if (!applyAiGeneratedPlan(data)) {
        aiPlanMessages.push({ role: "error", text: "Der Plan konnte nicht übernommen werden (unerwartetes Format). Magst du es nochmal anders beschreiben oder \"Plan jetzt erstellen\" erneut versuchen?" });
        render();
      }
    } else {
      aiPlanMessages.push({ role: "error", text: "Unerwartete Antwort erhalten. Bitte nochmal versuchen." });
      render();
    }
  } catch (e) {
    aiPlanLoading = false;
    aiPlanMessages.push({ role: "error", text: e.message || "Da ist etwas schiefgelaufen. Bitte nochmal versuchen." });
    render();
  }
}

// Seit v1.30.0: ersetzt alle direkten `#app`.innerHTML-Zuweisungen in render() - fuegt einen
// sanften Fade-in beim View-Wechsel hinzu (Reaktion auf Feedback, dass der harte innerHTML-
// Sprung beim Wechseln zwischen Ansichten "flasht"). CSS-Keyframe statt Inline-Opacity+rAF,
// damit ein erneuter Aufruf noch waehrend einer laufenden Animation sauber neu startet (Klasse
// entfernen + erzwungener Reflow + Klasse wieder hinzufuegen). Rein kosmetisch, kein Einfluss auf
// den bestehenden Fokus-Erhalt-Mechanismus (der input-Listener ruft render()/setAppHTML() ohnehin
// nie auf).
function setAppHTML(html) {
  const app = document.getElementById("app");
  if (!app) return;
  app.innerHTML = html;
  app.classList.remove("fade-in");
  void app.offsetWidth;
  app.classList.add("fade-in");
}

function render() {
  document.documentElement.setAttribute("data-theme", state.theme === "sepia" ? "sepia" : "dark");
  document.documentElement.setAttribute("data-textsize", state.textSize || "normal");
  const themeColorMeta = document.querySelector('meta[name="theme-color"]');
  if (themeColorMeta) themeColorMeta.setAttribute("content", state.theme === "sepia" ? "#a8461e" : "#c1440e");

  if (exPickerActive) {
    setAppHTML(renderExercisePicker());
    return;
  }

  if (aiPlanChatActive) {
    setAppHTML(renderAiPlanChatView());
    return;
  }

  if (planBuilderActive) {
    setAppHTML(renderPlanBuilder());
    return;
  }

  if (profileActive) {
    setAppHTML(renderProfileView());
    return;
  }

  if (adminViewActive) {
    setAppHTML(renderAdminView());
    return;
  }

  if (libraryActive) {
    setAppHTML(renderLibraryView());
    return;
  }

  if (physioViewActive) {
    setAppHTML(renderPhysioView());
    return;
  }

  if (journalViewActive) {
    setAppHTML(renderJournalView());
    return;
  }

  if (focusModeActive) {
    setAppHTML(renderFocusMode());
    return;
  }

  // Seit Entfernung des Startbildschirms (der dieses "noch nichts gewaehlt"-UI-Symptom vorher
  // abfing): state.currentPlan kann null sein (frische Installation, oder der zuletzt aktive
  // eigene Plan wurde geloescht). applyPlan(null) faellt intern zwar auf PLANS[0] (PPL) zurueck
  // (siehe dort), aber DAYS/EXERCISES duerfen deshalb NICHT einfach durchgerendert werden -
  // das waere exakt der in v1.48.1 gefixte Bug (App zeigt faelschlich PPL als aktiv gewaehlt),
  // nur an neuer Stelle. Deshalb expliziter Guard hier statt Verlass auf DAYS/EXERCISES.
  if (!state.currentPlan) {
    setAppHTML(`
      ${headerHTML()}
      ${gymRowHTML()}
      <div class="content">
        <p class="dim">Wähle oben einen Trainingsplan aus, um loszulegen.</p>
      </div>
    `);
    return;
  }

  const day = state.currentDay;
  const dayMeta = DAYS.find(d => d.id === day);
  // Seit v1.43.0: EXERCISES[day] plus frei hinzugefuegte Extra-Uebungen fuer diesen Tag - der
  // restliche Karten-Render-Code danach ist bereits generisch pro ex-Objekt, braucht keine
  // weitere Anpassung.
  const exercises = [...EXERCISES[day], ...(state.extraExercises[day] || [])];

  const tabsHTML = DAYS.map(d => `
    <button class="tab-btn ${d.id === day ? "active" : ""}" data-role="day-tab" data-day="${d.id}">${d.label}</button>
  `).join("");

  const cardsHTML = exercises.map(ex => {
    const swapKey = `${day}:${ex.id}`;
    const displayName = state.swaps[swapKey] || ex.name;
    const sets = getSetsFor(day, ex);
    const doneCount = sets.filter(s => s.done && !s.isWarmup).length;
    // Seit v1.53.0: faellt auf einen anderen Plan-Slot derselben realen Uebung zurueck, wenn hier
    // noch keine eigene Historie existiert - siehe findCrossPlanHistoryEntry().
    const hist = getHistoryEntry(ex.id) || findCrossPlanHistoryEntry(day, ex);
    const note = state.notes[swapKey] || "";

    const historyHTML = historyLineHTML(ex.id, hist);

    const swapPanelContent = swapOpenKey === swapKey ? swapPanelHTML(day, ex, swapKey) : "";

    const info = exerciseLibrary[ex.libraryId];
    const infoPanelHTML = info && infoOpenKey === swapKey ? exerciseInfoPanelHTML(ex) : "";
    const editMode = editModeKeys.has(swapKey);

    return `
      <div class="card">
        <div class="card-top">
          <div style="flex:1; min-width:0;">
            <div class="card-title-row">
              <h3>${displayName}</h3>
              ${ex.core ? '<span class="badge-core">CORE</span>' : ""}
              ${state.swaps[swapKey] ? `<span class="badge-swapped">statt ${ex.name}</span>` : ""}
            </div>
            <div class="target-line">${ex.sets} Sätze × ${ex.reps} Wdh.</div>
            ${historyHTML}
          </div>
          <div style="display:flex; gap:6px; flex-shrink:0;">
            ${info ? `<button class="swap-btn" title="Übung erklären" data-role="info-toggle" data-day="${day}" data-exid="${ex.id}">ℹ</button>` : ""}
            <button class="swap-btn" title="Übung tauschen" data-role="swap-toggle" data-day="${day}" data-exid="${ex.id}">⟲</button>
            <button class="swap-btn ${editMode ? "active" : ""}" title="${editMode ? "Bearbeiten beenden" : "Erledigte Sätze bearbeiten"}" data-role="edit-toggle" data-day="${day}" data-exid="${ex.id}">✎</button>
          </div>
        </div>
        ${infoPanelHTML}
        ${swapPanelContent}

// dateOverride (seit v1.50.0, "Training nachtragen"): YYYY-MM-DD aus dem Abschluss-Modal, statt
// immer "jetzt" - laesst vergessene/verpasste Einheiten nachtragen (z.B. Saetze, die schon in den
// Feldern standen, aber nie ueber "Training abschliessen" bestaetigt wurden). `timestamp` ist der
// Wert, den getWeekStart()/Streak-/Volumen-/PR-Berechnung fuer die Wochen-/Datums-Zuordnung
// nutzen - ein nachgetragener Eintrag zaehlt damit korrekt in der richtigen ISO-Woche statt in der
// aktuellen. dateOverrideToRefDate() haelt dabei die echte Uhrzeit bei (siehe dort) statt fest auf
// Mittag zu stempeln, damit mehrere Abschluesse am selben Tag eindeutige Timestamps behalten.
function finishSession(dayId, wellbeing, sessionNote, dateOverride) {
  const daySets = state.sessions[dayId] || {};
  const refDate = dateOverrideToRefDate(dateOverride);
  const today = refDate.toLocaleDateString("de-DE");
  const journalExercises = [];
  // Seit v1.43.0: EXERCISES[dayId] plus frei hinzugefuegte Extra-Uebungen dieses Tages - sonst
  // wuerden Extra-Uebungen weder ins Tagebuch/die Gewichtsprogression einfliessen noch (unten)
  // ihre Saetze nach Abschluss zurueckgesetzt.
  const dayExercises = [...EXERCISES[dayId], ...(state.extraExercises[dayId] || [])];
  dayExercises.forEach(ex => {
    const sets = daySets[ex.id];
    if (!sets) return;
    const enteredSets = sets.filter(s => s.weight || s.reps);
    if (enteredSets.length > 0) {
      journalExercises.push({
        exId: ex.id,
        name: state.swaps[`${dayId}:${ex.id}`] || ex.name,
        sets: enteredSets.map(s => ({ weight: s.weight, reps: s.reps, isWarmup: s.isWarmup, couldDoMore: s.couldDoMore })),
      });
    }
    const doneSets = enteredSets.filter(s => !s.isWarmup);
    if (doneSets.length > 0) {
      const last = doneSets[doneSets.length - 1];
      setHistoryEntry(ex.id, { weight: last.weight, reps: last.reps, date: today });

      // Gewichtsprogression: nur der letzte Arbeitssatz zaehlt (gleiches Prinzip wie oben
      // bei der History), Aufwaermsaetze sind bereits durch doneSets ausgeschlossen.
      const range = parseRepRange(ex.reps);
      const lastWeightNum = parseWeightNum(last.weight);
      const lastRepsNum = parseFloat(last.reps);
      if (range && last.couldDoMore && Number.isFinite(lastWeightNum) && Number.isFinite(lastRepsNum) && lastRepsNum >= range.max) {
        setWeightSuggestion(ex.id, { weight: computeSuggestedWeight(lastWeightNum, !!ex.compound), basedOnDate: today });
      } else {
        clearWeightSuggestion(ex.id);
      }
    }
    // Gewichte merken, damit sie beim nächsten Mal vorbefüllt sind
    const hasAnyWeight = sets.some(s => s.weight);
    if (hasAnyWeight) {
      setLastWeights(ex.id, sets.map(s => s.weight || ""));
    }
  });
  if (journalExercises.length > 0) {
    const dayMeta = DAYS.find(d => d.id === dayId);
    addJournalEntry({
      date: today,
      timestamp: refDate.getTime(),
      planId: state.currentPlan,
      dayId,
      dayLabel: dayMeta ? dayMeta.label : dayId,
      gymId: state.currentGymId || null,
      exercises: journalExercises,
      wellbeing: wellbeing || null,
      sessionNote: (sessionNote || "").trim() || null,
    });
  }
  const resetDay = {};
  dayExercises.forEach(ex => { resetDay[ex.id] = buildInitialSets(dayId, ex, ex.sets); });
  state.sessions[dayId] = resetDay;
  stopRestTimer();
  persist();
  render();
  showToast("Training gespeichert. Gewichte bleiben für nächstes Mal vorbefüllt.");
}

// ---------- PHYSIO ----------
// Physio-Uebungen (seit v1.42.0) laufen bewusst komplett entkoppelt von der Plan-/Tag-Rotation
// (DAYS/EXERCISES) - eine feste, von der Physiotherapeutin vorgegebene Uebungsliste, die auf
// einem eigenen rollierenden Intervall faellig wird ("alle N Tage"), unabhaengig davon welcher
// PPL-Tag gerade ansteht. Laeuft als reservierter Pseudo-Tag mit der ID "physio" durch dieselben
// generischen, bereits day-parametrisierten Funktionen wie ein echter Trainingstag
// (getSetsFor/ensureDaySets/setsRowsHTML/getHistoryEntry/getLastWeights) - keine davon musste
// geaendert werden, sie waren nie an DAYS/EXERCISES gebunden.
const PHYSIO_DAY_ID = "physio";

// Reine Ableitung aus state.physio.lastDoneAt (Unix-Timestamp, nicht ein de-DE-Anzeige-String -
// Faelligkeits-Mathematik braucht echte Tages-Differenzen).
function physioDueInfo() {
  if (!state.physio.lastDoneAt) return { due: true, daysSince: null };
  const daysSince = Math.floor((Date.now() - state.physio.lastDoneAt) / 86400000);
  return { due: daysSince >= state.physio.intervalDays, daysSince };
}

// Schlanke Variante von finishSession() ohne die trainingsspezifischen Teile (kein
// Wellbeing-Modal, kein Journal-Eintrag, keine Gewichts-Progressions-Vorschlaege) - Reha-Uebungen
// mit fester PT-Vorgabe brauchen keinen "mehr Gewicht"-Vorschlag, und Physio-Sessions sollen
// bewusst nicht das Wochenvolumen-Dashboard/den Streak-Zaehler beeinflussen (beide lesen nur
// state.journal, das hier unangetastet bleibt).
// dateOverride (seit v1.50.0): siehe finishSession() fuer die gleiche Begruendung. Zusaetzliche
// Nuance hier: wurde das Datum bewusst von "heute" weg veraendert (echtes Nachtragen, z.B. Physio
// von vor der Funktions-Einfuehrung), darf lastDoneAt auch ohne eingetragene Saetze aktualisiert
// werden - man erinnert sich oft nicht mehr an exakte Wiederholungen von vor ein paar Tagen, will
// aber trotzdem, dass der Faelligkeits-Countdown ab dem richtigen Datum neu laeuft. Bleibt das
// Datum auf heute stehen, gilt weiterhin die bisherige Schutzschranke gegen versehentliches
// Leer-Abschliessen.
function finishPhysioSession(dateOverride) {
  const daySets = state.sessions[PHYSIO_DAY_ID] || {};
  let anyEntered = false;
  const refDate = dateOverrideToRefDate(dateOverride);
  const today = refDate.toLocaleDateString("de-DE");
  state.physio.exercises.forEach(ex => {
    const sets = daySets[ex.id];
    if (!sets) return;
    const entered = sets.filter(s => s.weight || s.reps);
    if (entered.length === 0) return;
    anyEntered = true;
    const last = entered[entered.length - 1];
    setHistoryEntry(ex.id, { weight: last.weight, reps: last.reps, date: today });
  });
  const isBackdated = dateOverride && dateOverride !== todayISODate();
  if (!anyEntered && !isBackdated) {
    showToast("Keine Übung eingetragen.");
    return;
  }
  state.physio.lastDoneAt = refDate.getTime();
  const resetDay = {};
  state.physio.exercises.forEach(ex => { resetDay[ex.id] = buildInitialSets(PHYSIO_DAY_ID, ex, ex.sets); });
  state.sessions[PHYSIO_DAY_ID] = resetDay;
  persist();
  render();
  showToast("Physio gespeichert.");
}

// CSV-Export fuer Datenanalyse in Excel/Sheets (seit v1.60.0) - bewusst getrennt vom
// JSON-Backup oben (das die App selbst sichert/wiederherstellt). Eine Zeile pro geloggtem
// Satz (long format), damit Excel-Pivot-Tabellen direkt funktionieren, ohne dass der Nutzer
// erst wide-zu-long umformen muesste. Semikolon statt Komma als Feldtrenner UND Komma statt
// Punkt als Dezimaltrennzeichen (formatNumberDe) - beides zusammen ist noetig, weil deutsches
// Excel Komma als Dezimalzeichen erwartet und sonst z.B. "22,5" in zwei Spalten zerreisst.
// UTF-8-BOM (﻿) vor dem Blob-Inhalt, sonst zeigt Excel Umlaute in Uebungsnamen kaputt an.
function csvEscapeField(value) {
  const str = String(value ?? "");
  if (/[;"\r\n]/.test(str)) return `"${str.replace(/"/g, '""')}"`;
  return str;
}

function formatNumberDe(n) {
  return String(n).replace(".", ",");
}

function exportCsv() {
  const header = ["Datum", "Uhrzeit", "Plan", "Tag", "Übung", "Muskelgruppe", "Gym", "Satz-Nr", "Gewicht (kg)", "Wiederholungen", "Geschätztes 1RM (kg)", "Könnte mehr", "Aufwärmsatz"];
  const rows = [header];
  const pad = (n) => String(n).padStart(2, "0");
  state.journal.forEach(entry => {
    const planMeta = getAllPlans().find(p => p.id === entry.planId);
    const planLabel = planMeta ? planMeta.label : entry.planId;
    const gym = entry.gymId ? state.gyms.find(g => g.id === entry.gymId) : null;
    const d = new Date(entry.timestamp);
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
    const timeStr = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    entry.exercises.forEach(ex => {
      const def = findExerciseDefById(ex.exId);
      const info = def ? exerciseLibrary[def.libraryId] : null;
      const muscleGroup = (info && info.muscleGroup) || "";
      ex.sets.forEach((s, i) => {
        const weightNum = parseWeightNum(s.weight);
        const hasWeight = Number.isFinite(weightNum);
        const e1rm = hasWeight ? Math.round(estimateOneRepMax(weightNum, s.reps) * 10) / 10 : null;
        rows.push([
          dateStr,
          timeStr,
          planLabel,
          entry.dayLabel,
          ex.name,
          muscleGroup,
          gym ? gym.name : "",
          String(i + 1),
          hasWeight ? formatNumberDe(weightNum) : (s.weight || ""),
          s.reps || "",
          e1rm !== null ? formatNumberDe(e1rm) : "",
          s.couldDoMore ? "Ja" : "Nein",
          s.isWarmup ? "Ja" : "Nein",
        ]);
      });
    });
  });
  const csvBody = rows.map(row => row.map(csvEscapeField).join(";")).join("\r\n");
  const blob = new Blob(["﻿" + csvBody], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `fretze-saetze-${todayISODate()}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("CSV-Export wurde heruntergeladen.");
}

      if (!incoming || typeof incoming !== "object") throw new Error("Ungültiges Format");
      openConfirmModal({
        title: "Backup importieren",

        confirmLabel: "Importieren",
        onConfirm: () => {
          state = {
            currentDay: incoming.currentDay || "pushA",
            sessions: incoming.sessions || {},
            history: incoming.history || {},
            swaps: incoming.swaps || {},
            notes: incoming.notes || {},
            lastWeights: incoming.lastWeights || {},
            theme: incoming.theme || "sepia",
            currentPlan: incoming.currentPlan || null,
            textSize: incoming.textSize || "normal",
            gyms: incoming.gyms || [],
            currentGymId: incoming.currentGymId || null,
            gymLastWeights: incoming.gymLastWeights || {},
            gymHistory: incoming.gymHistory || {},
            journal: incoming.journal || [],
            customPlans: incoming.customPlans || [],

            weightSuggestions: incoming.weightSuggestions || {},

            updatedAt: incoming.updatedAt || null,

          };
          applyPlan(state.currentPlan);

          swapOpenKey = null;

      });
    } catch (e) {
      showToast("Die Datei konnte nicht gelesen werden. Ist es ein gültiges Fretze-Backup (.json)?");

}

// ---------- GOOGLE-DRIVE-BACKUP ----------
// Komplett unabhaengig vom Firebase-Login oben (kein Bezug zu currentUser/window.FretzeCloud) -
// eigener OAuth-Fluss ueber Google Identity Services (GIS), nur fuer diese eine Funktion. Das
// GIS-Skript wird bewusst erst beim ersten Klick nachgeladen (nicht beim Boot wie Firebase), da
// dies ein Opt-in-Feature ist, das die meisten Sessions nie anfassen. v1 legt bei jedem Klick
// eine neue, datumsgestempelte Datei an (kein Suchen/Ueberschreiben der letzten Backup-Datei) -
// einfacher, kein gespeicherter Datei-ID-State noetig; Drive-eigene Versionsgeschichte/Papierkorb
// reicht als Sicherheitsnetz fuer ein paar kleine JSON-Dateien.
function loadGisScript() {
  if (driveGisLoadPromise) return driveGisLoadPromise;
  driveGisLoadPromise = new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "https://accounts.google.com/gsi/client";
    s.async = true;
    s.onload = () => resolve();
    s.onerror = () => reject(new Error("GIS-Skript konnte nicht geladen werden"));
    document.head.appendChild(s);
  });
  return driveGisLoadPromise;
}

function ensureDriveTokenClient() {
  if (driveTokenClient) return Promise.resolve(driveTokenClient);
  return loadGisScript().then(() => {
    driveTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: DRIVE_CLIENT_ID,
      scope: DRIVE_SCOPE,
      callback: () => {},
      error_callback: () => {},
    });
    return driveTokenClient;
  });
}

function getDriveAccessToken() {
  if (driveAccessToken && driveAccessToken.expiresAt > Date.now() + 5000) {
    return Promise.resolve(driveAccessToken.token);
  }
  return ensureDriveTokenClient().then((client) => new Promise((resolve, reject) => {
    client.callback = (resp) => {
      if (resp.error) { reject(new Error(resp.error)); return; }
      driveAccessToken = { token: resp.access_token, expiresAt: Date.now() + resp.expires_in * 1000 };
      resolve(resp.access_token);
    };
    client.error_callback = (err) => reject(new Error((err && err.type) || "Abgebrochen"));
    client.requestAccessToken();
  }));
}

async function backupToDrive() {
  showToast("Verbinde mit Google Drive …");
  try {
    const token = await getDriveAccessToken();
    const payload = buildBackupPayload();
    const dateStr = new Date().toISOString().slice(0, 10);
    const fileName = `fretze-backup-${dateStr}.json`;
    const boundary = "fretze-boundary-" + Date.now();
    const metadata = { name: fileName, mimeType: "application/json" };
    const body =
      `--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(metadata)}\r\n` +
      `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(payload, null, 2)}\r\n` +
      `--${boundary}--`;
    const res = await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", {
      method: "POST",
      headers: { Authorization: `Bearer ${token}`, "Content-Type": `multipart/related; boundary=${boundary}` },
      body,
    });
    if (!res.ok) throw new Error(`Drive-Fehler (${res.status})`);
    showToast("Backup in Google Drive gesichert.");
  } catch (e) {
    showToast("Google-Drive-Backup fehlgeschlagen" + (e && e.message ? ` (${e.message})` : "") + ".");
  }
}

function friendlyAuthError(err) {
  const code = err && err.code;
  const messages = {
    "auth/invalid-email": "Ungültige E-Mail-Adresse.",
    "auth/user-not-found": "Kein Konto mit dieser E-Mail gefunden.",
    "auth/wrong-password": "Falsches Passwort.",
    "auth/invalid-credential": "E-Mail oder Passwort falsch.",
    "auth/email-already-in-use": "Für diese E-Mail existiert bereits ein Konto — versuch stattdessen einzuloggen.",
    "auth/weak-password": "Passwort zu schwach (mindestens 6 Zeichen).",
    "auth/missing-password": "Bitte ein Passwort eingeben.",
    "auth/popup-closed-by-user": "Google-Login abgebrochen.",

  };
  if (code && messages[code]) return messages[code];
  return "Login fehlgeschlagen" + (code ? ` (${code})` : "") + ".";
}

function showToast(msg) {

}

// ---------- EVENT DELEGATION ----------
document.addEventListener("click", (e) => {
  const modalOverlayClick = e.target.closest('[data-role="modal-overlay"]');
  if (modalOverlayClick && e.target === modalOverlayClick) {
    closeModal();
    return;
  }

  const modalCancel = e.target.closest('[data-role="modal-cancel"]');
  if (modalCancel) {
    closeModal();
    return;
  }

  const modalSkip = e.target.closest('[data-role="modal-skip"]');
  if (modalSkip) {
    const current = modal;
    const note = current && current.includeNote ? (document.getElementById("modal-note-field")?.value ?? "") : "";
    const dateStr = current && current.includeDate ? (document.getElementById("modal-date-field")?.value || "") : "";
    closeModal();
    if (current && current.onConfirm) current.onConfirm(null, note, dateStr);
    return;
  }

  const modalChoiceSelect = e.target.closest('[data-role="modal-choice-select"]');
  if (modalChoiceSelect) {
    const current = modal;
    const value = modalChoiceSelect.dataset.value;
    const note = current && current.includeNote ? (document.getElementById("modal-note-field")?.value ?? "") : "";
    const dateStr = current && current.includeDate ? (document.getElementById("modal-date-field")?.value || "") : "";
    closeModal();
    if (current && current.onConfirm) current.onConfirm(value, note, dateStr);
    return;
  }

  const modalConfirm = e.target.closest('[data-role="modal-confirm"]');
  if (modalConfirm) {
    const current = modal;
    const value = current && current.kind === "prompt" ? (document.getElementById("modal-input-field")?.value ?? "") : undefined;
    closeModal();
    if (current && current.onConfirm) current.onConfirm(value);
    return;
  }

  const focusEnter = e.target.closest('[data-role="focus-enter"]');
  if (focusEnter) {
    const day = focusEnter.dataset.day;
    focusQueue = [...EXERCISES[day], ...(state.extraExercises[day] || [])].map(ex => ex.id);
    focusPos = 0;
    focusInfoOpen = false;
    focusSwapOpen = false;
    focusEditOpen = false;
    focusModeActive = true;
    render();
    return;
  }

  const focusExit = e.target.closest('[data-role="focus-exit"]');
  if (focusExit) {
    focusModeActive = false;
    render();
    return;
  }

  const focusNext = e.target.closest('[data-role="focus-next"]');
  if (focusNext) {
    focusPos = Math.min(focusPos + 1, focusQueue.length - 1);
    focusInfoOpen = false;
    focusSwapOpen = false;
    focusEditOpen = false;
    render();
    return;
  }

  const focusPrev = e.target.closest('[data-role="focus-prev"]');
  if (focusPrev) {
    focusPos = Math.max(focusPos - 1, 0);
    focusInfoOpen = false;
    focusSwapOpen = false;
    focusEditOpen = false;
    render();
    return;
  }

  const focusSkip = e.target.closest('[data-role="focus-skip"]');
  if (focusSkip) {
    skipCurrent();
    focusInfoOpen = false;
    focusSwapOpen = false;
    focusEditOpen = false;
    render();
    return;
  }

  const focusInfoToggle = e.target.closest('[data-role="focus-info-toggle"]');
  if (focusInfoToggle) {
    focusInfoOpen = !focusInfoOpen;
    if (focusInfoOpen) focusSwapOpen = false;
    render();
    return;
  }

  const focusSwapToggle = e.target.closest('[data-role="focus-swap-toggle"]');
  if (focusSwapToggle) {
    focusSwapOpen = !focusSwapOpen;
    if (focusSwapOpen) focusInfoOpen = false;
    render();
    return;
  }

  const focusEditToggle = e.target.closest('[data-role="focus-edit-toggle"]');
  if (focusEditToggle) {
    focusEditOpen = !focusEditOpen;
    render();
    return;
  }

  const journalEnter = e.target.closest('[data-role="journal-enter"]');
  if (journalEnter) {
    focusModeActive = false;
    profileActive = false;
    libraryActive = false;
    physioViewActive = false;
    journalViewActive = true;
    render();
    return;
  }

  const journalExit = e.target.closest('[data-role="journal-exit"]');
  if (journalExit) {
    journalViewActive = false;
    render();
    return;
  }

  // Seit v1.51.0: das Tagebuch war bewusst read-only (siehe CLAUDE.md), aber mit dem editierbaren
  // Abschluss-Datum (v1.50.0) sind versehentliche Mehrfach-/Fehleintraege beim Nachtragen
  // realistisch - timestamp ist bereits die eindeutige ID pro Eintrag (siehe mergeJournals()).
  const journalDeleteEntry = e.target.closest('[data-role="journal-delete-entry"]');
  if (journalDeleteEntry) {
    const ts = Number(journalDeleteEntry.dataset.timestamp);
    openConfirmModal({
      title: "Eintrag löschen?",
      message: "Dieser Tagebuch-Eintrag wird endgültig entfernt. Gewichte/Historie der Übungen selbst bleiben unangetastet.",
      confirmLabel: "Löschen",
      onConfirm: () => {
        state.journal = state.journal.filter(e => e.timestamp !== ts);
        persist();
        render();
        showToast("Eintrag gelöscht.");
      },
    });

    if (ex && suggestion) {
      const sets = ensureDaySets(day, ex);
      sets.forEach(s => { s.weight = String(suggestion.weight); });
      clearWeightSuggestion(exid);
    }
    persist();
    render();
    return;
  }

  const doneBtn = e.target.closest('[data-role="set-done"]');
  if (doneBtn) {
    const { day, exid, idx } = doneBtn.dataset;
    const ex = findExerciseById(day, exid);
    const sets = ensureDaySets(day, ex);
    const nowDone = !sets[idx].done;
    sets[idx].done = nowDone;
    persist();
    render();
    if (nowDone) startRestTimer(ex.compound ? REST_DURATION_COMPOUND : REST_DURATION_DEFAULT);
    return;
  }

  const restMinus = e.target.closest('[data-role="rest-minus"]');
  if (restMinus) {
    adjustRestTimer(-15);
    return;
  }

  const restPlus = e.target.closest('[data-role="rest-plus"]');
  if (restPlus) {
    adjustRestTimer(15);
    return;
  }

  const restSkip = e.target.closest('[data-role="rest-skip"]');
  if (restSkip) {
    stopRestTimer();
    return;
  }

  const finishBtn = e.target.closest('[data-role="finish"]');
  if (finishBtn) {
    const dayId = finishBtn.dataset.day;
    focusModeActive = false;
    openChoiceModal({
      title: "Wie war das Training?",
      message: "Optional - hilft dir später im Tagebuch, dein Wohlbefinden über die Zeit zu verfolgen.",
      options: [
        { value: "good", label: "😊" },
        { value: "ok", label: "😐" },
        { value: "bad", label: "😖" },
      ],
      includeNote: true,
      notePlaceholder: "Notiz zur Einheit (Schlaf, Energie, Krankheit …) — optional",
      includeDate: true,
      defaultDate: todayISODate(),
      onConfirm: (wellbeing, sessionNote, dateStr) => finishSession(dayId, wellbeing, sessionNote, dateStr),
    });
    return;
  }
});

// Text inputs: update state without full re-render (preserves focus/cursor)
document.addEventListener("input", (e) => {
  const field = e.target.closest('[data-role="set-field"]');
  if (field) {
    const { day, exid, idx, field: f } = field.dataset;
    const ex = findExerciseById(day, exid);
    const sets = ensureDaySets(day, ex);
    sets[idx][f] = field.value;
    persist();
    return;
  }
  const note = e.target.closest('[data-role="note"]');
  if (note) {
    const key = `${note.dataset.day}:${note.dataset.exid}`;
    state.notes[key] = note.value;
    persist();
    return;
  }

  const physioExName = e.target.closest('[data-role="physio-ex-name"]');
  if (physioExName) {
    const ex = state.physio.exercises.find(x => x.id === physioExName.dataset.exid);
    if (ex) ex.name = physioExName.value;
    persist();
    return;
  }

  const physioExSets = e.target.closest('[data-role="physio-ex-sets"]');
  if (physioExSets) {
    const ex = state.physio.exercises.find(x => x.id === physioExSets.dataset.exid);
    if (ex) ex.sets = Number(physioExSets.value) || 1;
    persist();
    return;
  }

  const physioExReps = e.target.closest('[data-role="physio-ex-reps"]');
  if (physioExReps) {
    const ex = state.physio.exercises.find(x => x.id === physioExReps.dataset.exid);
    if (ex) ex.reps = physioExReps.value;
    persist();
    return;
  }

  const physioInterval = e.target.closest('[data-role="physio-interval"]');
  if (physioInterval) {
    state.physio.intervalDays = Math.max(1, Number(physioInterval.value) || 1);
    persist();
    return;
  }

  const extraExName = e.target.closest('[data-role="extra-ex-name"]');
  if (extraExName) {
    const list = state.extraExercises[extraExName.dataset.day] || [];
    const ex = list.find(x => x.id === extraExName.dataset.exid);
    if (ex) {
      ex.name = extraExName.value;
      // Nur automatisch verknuepfen, wenn der Name exakt einem Datenbank-Eintrag entspricht
      // (z.B. per Datalist-Vorschlag gewaehlt) - bei Freitext bleibt libraryId leer, gleiche
      // Kulanz wie beim Plan-Builder (draft-ex-name-Handler).
      const matchedId = libraryIdForName(extraExName.value);
      if (matchedId) ex.libraryId = matchedId; else delete ex.libraryId;
    }
    persist();
    return;
  }

  const extraExSets = e.target.closest('[data-role="extra-ex-sets"]');
  if (extraExSets) {
    const list = state.extraExercises[extraExSets.dataset.day] || [];
    const ex = list.find(x => x.id === extraExSets.dataset.exid);
    if (ex) ex.sets = Number(extraExSets.value) || 1;
    persist();
    return;
  }

  const extraExReps = e.target.closest('[data-role="extra-ex-reps"]');
  if (extraExReps) {
    const list = state.extraExercises[extraExReps.dataset.day] || [];
    const ex = list.find(x => x.id === extraExReps.dataset.exid);
    if (ex) ex.reps = extraExReps.value;
    persist();
    return;
  }

  const pwLiveCheck = e.target.closest('[data-role="login-password-live-check"]');
  if (pwLiveCheck) {
    const pw = document.getElementById("login-password-input");
    const confirmField = document.getElementById("login-password-confirm-input");
    const msg = document.getElementById("login-password-match-msg");
    if (pw && confirmField && msg) {
      if (!confirmField.value) {
        msg.textContent = "";
        msg.className = "login-password-match";
      } else if (pw.value === confirmField.value) {
        msg.textContent = "✓ Passwörter stimmen überein";
        msg.className = "login-password-match ok";
      } else {
        msg.textContent = "✕ Passwörter stimmen nicht überein";
        msg.className = "login-password-match bad";
      }
    }
    return;
  }

  const draftLabel = e.target.closest('[data-role="draft-label"]');
  if (draftLabel) {
    state.planDraft.label = draftLabel.value;
    persist();
    return;
  }

  const draftDayLabel = e.target.closest('[data-role="draft-day-label"]');
  if (draftDayLabel) {
    state.planDraft.days[Number(draftDayLabel.dataset.day)].label = draftDayLabel.value;
    persist();
    return;
  }

  const draftExName = e.target.closest('[data-role="draft-ex-name"]');
  if (draftExName) {
    const draftEx = state.planDraft.days[Number(draftExName.dataset.day)].exercises[Number(draftExName.dataset.ex)];
    draftEx.name = draftExName.value;
    // Nur automatisch verknuepfen, wenn der Name exakt einem Datenbank-Eintrag entspricht
    // (z.B. per Datalist-Vorschlag gewaehlt) - bei Freitext bleibt libraryId leer.
    const matchedId = libraryIdForName(draftExName.value);
    if (matchedId) draftEx.libraryId = matchedId; else delete draftEx.libraryId;
    persist();
    return;
  }

  const draftExSets = e.target.closest('[data-role="draft-ex-sets"]');
  if (draftExSets) {
    state.planDraft.days[Number(draftExSets.dataset.day)].exercises[Number(draftExSets.dataset.ex)].sets = draftExSets.value;
    persist();
    return;
  }

  const draftExReps = e.target.closest('[data-role="draft-ex-reps"]');
  if (draftExReps) {
    state.planDraft.days[Number(draftExReps.dataset.day)].exercises[Number(draftExReps.dataset.ex)].reps = draftExReps.value;
    persist();
    return;
  }
});

document.addEventListener("change", (e) => {
  if (e.target && e.target.id === "import-file-input") {
    const file = e.target.files && e.target.files[0];
    if (file) importData(file);
    e.target.value = "";
  }

  const planSelect = e.target.closest('[data-role="plan-select"]');
  if (planSelect) {
    // Seit v1.59.0: die Dropdown-Liste enthaelt neben echten Plaenen auch zwei Sentinel-Werte
    // fuer "neuen Plan erstellen" - kein echter Plan-Wechsel (startPlanBuilder()/startAiPlanChat()
    // rendern ohnehin eine komplett andere Ansicht, das <select> selbst existiert danach nicht mehr).
    if (planSelect.value === "__new_plan__") { startPlanBuilder(); return; }
    if (planSelect.value === "__ai_plan__") { startAiPlanChat(); return; }
    state.currentPlan = planSelect.value;
    applyPlan(state.currentPlan);
    state.currentDay = DAYS[0].id;
    swapOpenKey = null;
    infoOpenKey = null;
    warmupOpen = false;
    stretchOpen = false;
    persist();
    render();
  }

  const gymSelect = e.target.closest('[data-role="gym-select"]');
  if (gymSelect) {
    state.currentGymId = gymSelect.value || null;
    persist();
    render();
  }

  // Seit v1.23.0: Wiederholungen eingetragen (Feld verlassen/bestaetigt) -> Satz automatisch
  // als erledigt markieren, Haekchen gruen faerben, Pausen-Timer starten - erspart den
  // zusaetzlichen Tipp auf das Haekchen. Nur bei der ersten Eintragung (noch nicht erledigt),
  // damit ein spaeteres Korrigieren der Wiederholungen den Timer nicht erneut auslöst; manuelles
  // Abhaken/Zuruecknehmen ueber das Haekchen bleibt unveraendert moeglich.
  const repsField = e.target.closest('[data-role="set-field"][data-field="reps"]');
  if (repsField) {
    const { day, exid, idx } = repsField.dataset;
    const ex = findExerciseById(day, exid);
    const sets = ex ? ensureDaySets(day, ex) : null;
    const s = sets ? sets[idx] : null;
    if (s && !s.done && String(s.reps).trim() !== "") {
      s.done = true;
      persist();
      render();
      startRestTimer(ex.compound ? REST_DURATION_COMPOUND : REST_DURATION_DEFAULT);
    }
  }
});

// Firebase laedt per <script type="module"> (siehe Skriptende) asynchron und komplett
// unabhaengig vom ersten Rendern - genau wie loadExerciseLibrary() unten. Schlaegt das
// Laden fehl (offline, CDN nicht erreichbar), feuert "fretzecloud-ready" nie: Login-Buttons
// bleiben sichtbar, aber ohne Funktion (siehe die window.FretzeCloud-Checks oben), kein Absturz.
window.addEventListener("fretzecloud-ready", () => {
  window.FretzeCloud.onAuthChange((user) => {
    const wasLoggedIn = !!currentUser;
    currentUser = user;
    if (user) { loginEmailFormOpen = false; reconcileCloudState(user.uid); }
    if (!user) { editNameOpen = false; adminViewActive = false; adminUsers = []; adminError = null; cloudSyncStatus = "idle"; }
    render();
    if (user && !wasLoggedIn) showToast(`Eingeloggt als ${user.email || user.displayName || "Konto"}.`);
    if (!user && wasLoggedIn) showToast("Ausgeloggt.");
  });
});

render();
loadExerciseLibrary();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW-Registrierung fehlgeschlagen", e));
  });
}
</script>

<!-- Konto/Login: eigener <script type="module">-Block, da das Firebase-JS-SDK per CDN-ESM-Import
     geladen wird, waehrend das Haupt-Script oben bewusst ein klassisches Script bleibt (kein
     Umbau der gesamten App auf ES-Module). Exponiert nur eine schlanke Wrapper-API auf
     window.FretzeCloud - derselbe Isolationsgedanke wie bei PROXY_URL fuer den Gemini-Worker.
     Seit v1.22.0 (Phase B) auch Firestore-Datensync (saveState/loadState) - siehe
     reconcileCloudState() im Haupt-Script fuer die Merge-Logik. -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // Firebase-Web-Config ist bewusst oeffentlich (anders als der Gemini-API-Key) - Sicherheit
  // kommt ueber Firebase Auth + spaetere Firestore Security Rules, nicht ueber Geheimhaltung
  // dieser Werte. Siehe CLAUDE.md "Konto/Login" fuer den Hintergrund.
  const firebaseConfig = {
    apiKey: "AIzaSyAlfxzDTi18iGPIR4xzo_2-XpCo7tHYw0Y",
    authDomain: "fretze-pumpt.firebaseapp.com",
    projectId: "fretze-pumpt",
    storageBucket: "fretze-pumpt.firebasestorage.app",
    messagingSenderId: "1039659812800",
    appId: "1:1039659812800:web:9366de3308e15b2765aa25",
  };

  try {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    window.FretzeCloud = {
      signInGoogle: () => signInWithPopup(auth, googleProvider),
      signInEmail: (email, password) => signInWithEmailAndPassword(auth, email, password),
      // Setzt bei Bedarf einen selbstgewaehlten Anzeigenamen direkt nach dem Anlegen des Kontos
      // und liefert (anders als signInEmail) die fertigen Nutzerdaten zurueck, statt sich auf
      // onAuthChange zu verlassen - das erste onAuthChange-Feuern koennte sonst noch den alten
      // (leeren) Anzeigenamen zeigen, da updateProfile() erst danach ablaeuft.
      signUpEmail: async (email, password, displayName) => {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        if (displayName) await updateProfile(cred.user, { displayName });
        return { uid: cred.user.uid, email: cred.user.email, displayName: cred.user.displayName };
      },
      resetPassword: (email) => sendPasswordResetEmail(auth, email),
      updateDisplayName: async (name) => {
        if (!auth.currentUser) throw new Error("Nicht eingeloggt.");
        await updateProfile(auth.currentUser, { displayName: name });
        return { uid: auth.currentUser.uid, email: auth.currentUser.email, displayName: auth.currentUser.displayName };
      },
      signOutUser: () => signOut(auth),
      // Seit v1.45.0 (Admin-Panel): der Worker muss serverseitig beweisen koennen, dass eine
      // Admin-Anfrage wirklich vom eingeloggten Admin kommt - der Firebase-ID-Token ist dafuer
      // der Beleg (siehe verifyCallerIsAdmin() im Worker).
      getIdToken: () => (auth.currentUser ? auth.currentUser.getIdToken() : Promise.resolve(null)),
      onAuthChange: (cb) => onAuthStateChanged(auth, (user) => {
        cb(user ? { uid: user.uid, email: user.email, displayName: user.displayName } : null);
      }),
      // Seit v1.22.0 (Phase B): Firestore-Spiegel des kompletten state-Blobs unter users/{uid}.
      // JSON-Rundreise vor setDoc sanitisiert undefined-Felder (Firestore wirft sonst, anders
      // als JSON.stringify beim lokalen persist()).
      saveState: (uid, stateObj) => setDoc(doc(db, "users", uid), JSON.parse(JSON.stringify(stateObj))),
      loadState: async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        return snap.exists() ? snap.data() : null;
      },
    };
    window.dispatchEvent(new CustomEvent("fretzecloud-ready"));
  } catch (e) {
    // Offline beim allerersten Laden oder CDN nicht erreichbar - graceful, kein Absturz.
    // window.FretzeCloud bleibt undefined, die Login-Buttons im Profil pruefen das vor
    // jedem Aufruf und zeigen stattdessen einen Toast statt einer Exception.
    console.warn("Firebase konnte nicht initialisiert werden:", e);
  }
</script>
