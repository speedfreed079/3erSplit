    startEditingPlan(homeEditPlan.dataset.planid);
    return;
  }

  const homeDeletePlan = e.target.closest('[data-role="home-delete-plan"]');
  if (homeDeletePlan) {
    const plan = state.customPlans.find(p => p.id === homeDeletePlan.dataset.planid);
    openConfirmModal({
      title: "Plan löschen",
      message: `Plan "${plan ? plan.label : ""}" wirklich löschen?`,
      onConfirm: () => deleteCustomPlan(homeDeletePlan.dataset.planid),
    });
    return;
  }

  const planBuilderEnter = e.target.closest('[data-role="plan-builder-enter"]');
  if (planBuilderEnter) {
    if (!state.planDraft) state.planDraft = newPlanDraft();
    planBuilderActive = true;
    persist();
    render();
    return;
  }

  const draftAddDayBtn = e.target.closest('[data-role="draft-add-day"]');
  if (draftAddDayBtn) {
    draftAddDay();
    persist();
    render();
    return;
  }

  const draftRemoveDayBtn = e.target.closest('[data-role="draft-remove-day"]');
  if (draftRemoveDayBtn) {
    draftRemoveDay(Number(draftRemoveDayBtn.dataset.day));
    persist();
    render();
    return;
  }

  const draftAddExBtn = e.target.closest('[data-role="draft-add-ex"]');
  if (draftAddExBtn) {
    draftAddExercise(Number(draftAddExBtn.dataset.day));
    persist();
    render();
    return;
  }

  const draftRemoveExBtn = e.target.closest('[data-role="draft-remove-ex"]');
  if (draftRemoveExBtn) {
    draftRemoveExercise(Number(draftRemoveExBtn.dataset.day), Number(draftRemoveExBtn.dataset.ex));
    persist();
    render();
    return;
  }

  const planDraftSave = e.target.closest('[data-role="plan-draft-save"]');
  if (planDraftSave) {
    savePlanDraft();
    return;
  }

  const planDraftCancel = e.target.closest('[data-role="plan-draft-cancel"]');
  if (planDraftCancel) {
    cancelPlanDraft();
    return;
  }

  const themeToggle = e.target.closest('[data-role="theme-toggle"]');
  if (themeToggle) {
    state.theme = state.theme === "sepia" ? "dark" : "sepia";
    persist();
    render();
    return;
  }

  const textSizeToggle = e.target.closest('[data-role="textsize-toggle"]');
  if (textSizeToggle) {
    state.textSize = nextTextSize(state.textSize || "normal");
    persist();
    render();
    return;
  }

  const exportBtn = e.target.closest('[data-role="export"]');
  if (exportBtn) {
    exportData();
    return;
  }

  const importTrigger = e.target.closest('[data-role="import-trigger"]');
  if (importTrigger) {
    const input = document.getElementById("import-file-input");
    if (input) input.click();
    return;
  }

  const driveBackup = e.target.closest('[data-role="drive-backup"]');
  if (driveBackup) {
    backupToDrive();
    return;
  }

  const dayTab = e.target.closest('[data-role="day-tab"]');
  if (dayTab) {
    state.currentDay = dayTab.dataset.day;
    swapOpenKey = null;
    infoOpenKey = null;
    warmupOpen = false;
    stretchOpen = false;
    persist();
    render();
    return;
  }

  const swapToggle = e.target.closest('[data-role="swap-toggle"]');
  if (swapToggle) {
    const key = `${swapToggle.dataset.day}:${swapToggle.dataset.exid}`;
    swapOpenKey = swapOpenKey === key ? null : key;
    // Seit v1.30.0: Info- und Tausch-Panel sind gegenseitig exklusiv (nie beide gleichzeitig
    // offen) - Reaktion auf Feedback, dass die Karte bei mehreren offenen Panels "kollabiert".
    if (swapOpenKey) infoOpenKey = null;
    render();
    return;
  }

  const infoToggle = e.target.closest('[data-role="info-toggle"]');
  if (infoToggle) {
    const key = `${infoToggle.dataset.day}:${infoToggle.dataset.exid}`;
    infoOpenKey = infoOpenKey === key ? null : key;
    if (infoOpenKey) swapOpenKey = null;
    render();
    return;
  }

  const editToggle = e.target.closest('[data-role="edit-toggle"]');
  if (editToggle) {
    const key = `${editToggle.dataset.day}:${editToggle.dataset.exid}`;
    if (editModeKeys.has(key)) editModeKeys.delete(key); else editModeKeys.add(key);
    render();
    return;
  }

  const warmupToggle = e.target.closest('[data-role="warmup-toggle"]');
  if (warmupToggle) {
    warmupOpen = !warmupOpen;
    render();
    return;
  }

  const stretchToggle = e.target.closest('[data-role="stretch-toggle"]');
  if (stretchToggle) {
    stretchOpen = !stretchOpen;
    render();
    return;
  }

  const gymManageToggle = e.target.closest('[data-role="gym-manage-toggle"]');
  if (gymManageToggle) {
    gymManageOpen = !gymManageOpen;
    render();
    return;
  }

  const gymAdd = e.target.closest('[data-role="gym-add"]');
  if (gymAdd) {
    openPromptModal({
      title: "Neues Gym",
      message: "Name des neuen Gyms (z.B. \"MCFit Köln\"):",
      onConfirm: (name) => { if (name && name.trim()) addGym(name.trim()); },
    });
    return;
  }

  const gymRename = e.target.closest('[data-role="gym-rename"]');
  if (gymRename) {
    const gym = state.gyms.find(g => g.id === gymRename.dataset.gymid);
    openPromptModal({
      title: "Gym umbenennen",
      message: "Neuer Name:",
      defaultValue: gym ? gym.name : "",
      onConfirm: (name) => { if (name && name.trim()) renameGym(gymRename.dataset.gymid, name.trim()); },
    });
    return;
  }

  const gymDelete = e.target.closest('[data-role="gym-delete"]');
  if (gymDelete) {
    const gym = state.gyms.find(g => g.id === gymDelete.dataset.gymid);
    openConfirmModal({
      title: "Gym löschen",
      message: `Gym "${gym ? gym.name : ""}" wirklich aus der Liste löschen?`,
      onConfirm: () => deleteGym(gymDelete.dataset.gymid),
    });
    return;
  }

  const swapSelect = e.target.closest('[data-role="swap-select"]');
  if (swapSelect) {
    const key = `${swapSelect.dataset.day}:${swapSelect.dataset.exid}`;
    state.swaps[key] = swapSelect.dataset.alt;
    swapOpenKey = null;
    focusSwapOpen = false;
    persist();
    render();
    return;
  }

  const swapClear = e.target.closest('[data-role="swap-clear"]');
  if (swapClear) {
    const key = `${swapClear.dataset.day}:${swapClear.dataset.exid}`;
    delete state.swaps[key];
    swapOpenKey = null;
    focusSwapOpen = false;
    persist();
    render();
    return;
  }

  const aiSuggestBtn = e.target.closest('[data-role="ai-suggest"]');
  if (aiSuggestBtn) {
    fetchAiSuggestions(aiSuggestBtn.dataset.day, aiSuggestBtn.dataset.exid);
    return;
  }

  const setWarmupToggle = e.target.closest('[data-role="set-warmup-toggle"]');
  if (setWarmupToggle) {
    const { day, exid, idx } = setWarmupToggle.dataset;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const sets = ensureDaySets(day, ex);
    sets[idx].isWarmup = !sets[idx].isWarmup;
    persist();
    render();
    return;
  }

  const setCouldMoreToggle = e.target.closest('[data-role="set-couldmore-toggle"]');
  if (setCouldMoreToggle) {
    const { day, exid, idx } = setCouldMoreToggle.dataset;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const sets = ensureDaySets(day, ex);
    sets[idx].couldDoMore = !sets[idx].couldDoMore;
    persist();
    render();
    return;
  }

  const suggestionAccept = e.target.closest('[data-role="suggestion-accept"]');
  if (suggestionAccept) {
    const exid = suggestionAccept.dataset.exid;
    const day = state.currentDay;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const suggestion = getWeightSuggestion(exid);
    if (ex && suggestion) {
      const sets = ensureDaySets(day, ex);
      sets.forEach(s => { s.weight = String(suggestion.weight); });
      clearWeightSuggestion(exid);
    }
    persist();
    render();
    return;
  }

  const doneBtn = e.target.closest('[data-role="set-done"]');
  if (doneBtn) {
    const { day, exid, idx } = doneBtn.dataset;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const sets = ensureDaySets(day, ex);
    const nowDone = !sets[idx].done;
    sets[idx].done = nowDone;
    persist();
    render();
    if (nowDone) startRestTimer(ex.compound ? REST_DURATION_COMPOUND : REST_DURATION_DEFAULT);
    return;
  }

  const restMinus = e.target.closest('[data-role="rest-minus"]');
  if (restMinus) {
    adjustRestTimer(-15);
    return;
  }

  const restPlus = e.target.closest('[data-role="rest-plus"]');
  if (restPlus) {
    adjustRestTimer(15);
    return;
  }

  const restSkip = e.target.closest('[data-role="rest-skip"]');
  if (restSkip) {
    stopRestTimer();
    return;
  }

  const finishBtn = e.target.closest('[data-role="finish"]');
  if (finishBtn) {
    const dayId = finishBtn.dataset.day;
    focusModeActive = false;
    openChoiceModal({
      title: "Wie war das Training?",
      message: "Optional - hilft dir später im Tagebuch, dein Wohlbefinden über die Zeit zu verfolgen.",
      options: [
        { value: "good", label: "😊" },
        { value: "ok", label: "😐" },
        { value: "bad", label: "😖" },
      ],
      includeNote: true,
      notePlaceholder: "Notiz zur Einheit (Schlaf, Energie, Krankheit …) — optional",
      onConfirm: (wellbeing, sessionNote) => finishSession(dayId, wellbeing, sessionNote),
    });
    return;
  }
});

// Text inputs: update state without full re-render (preserves focus/cursor)
document.addEventListener("input", (e) => {
  const field = e.target.closest('[data-role="set-field"]');
  if (field) {
    const { day, exid, idx, field: f } = field.dataset;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const sets = ensureDaySets(day, ex);
    sets[idx][f] = field.value;
    persist();
    return;
  }
  const note = e.target.closest('[data-role="note"]');
  if (note) {
    const key = `${note.dataset.day}:${note.dataset.exid}`;
    state.notes[key] = note.value;
    persist();
    return;
  }

  const pwLiveCheck = e.target.closest('[data-role="login-password-live-check"]');
  if (pwLiveCheck) {
    const pw = document.getElementById("login-password-input");
    const confirmField = document.getElementById("login-password-confirm-input");
    const msg = document.getElementById("login-password-match-msg");
    if (pw && confirmField && msg) {
      if (!confirmField.value) {
        msg.textContent = "";
        msg.className = "login-password-match";
      } else if (pw.value === confirmField.value) {
        msg.textContent = "✓ Passwörter stimmen überein";
        msg.className = "login-password-match ok";
      } else {
        msg.textContent = "✕ Passwörter stimmen nicht überein";
        msg.className = "login-password-match bad";
      }
    }
    return;
  }

  const draftLabel = e.target.closest('[data-role="draft-label"]');
  if (draftLabel) {
    state.planDraft.label = draftLabel.value;
    persist();
    return;
  }

  const draftDayLabel = e.target.closest('[data-role="draft-day-label"]');
  if (draftDayLabel) {
    state.planDraft.days[Number(draftDayLabel.dataset.day)].label = draftDayLabel.value;
    persist();
    return;
  }

  const draftExName = e.target.closest('[data-role="draft-ex-name"]');
  if (draftExName) {
    const draftEx = state.planDraft.days[Number(draftExName.dataset.day)].exercises[Number(draftExName.dataset.ex)];
    draftEx.name = draftExName.value;
    // Nur automatisch verknuepfen, wenn der Name exakt einem Datenbank-Eintrag entspricht
    // (z.B. per Datalist-Vorschlag gewaehlt) - bei Freitext bleibt libraryId leer.
    const matchedId = libraryIdForName(draftExName.value);
    if (matchedId) draftEx.libraryId = matchedId; else delete draftEx.libraryId;
    persist();
    return;
  }

  const draftExSets = e.target.closest('[data-role="draft-ex-sets"]');
  if (draftExSets) {
    state.planDraft.days[Number(draftExSets.dataset.day)].exercises[Number(draftExSets.dataset.ex)].sets = draftExSets.value;
    persist();
    return;
  }

  const draftExReps = e.target.closest('[data-role="draft-ex-reps"]');
  if (draftExReps) {
    state.planDraft.days[Number(draftExReps.dataset.day)].exercises[Number(draftExReps.dataset.ex)].reps = draftExReps.value;
    persist();
    return;
  }
});

document.addEventListener("change", (e) => {
  if (e.target && e.target.id === "import-file-input") {
    const file = e.target.files && e.target.files[0];
    if (file) importData(file);
    e.target.value = "";
  }

  const planSelect = e.target.closest('[data-role="plan-select"]');
  if (planSelect) {
    state.currentPlan = planSelect.value;
    applyPlan(state.currentPlan);
    state.currentDay = DAYS[0].id;
    swapOpenKey = null;
    infoOpenKey = null;
    warmupOpen = false;
    stretchOpen = false;
    persist();
    render();
  }

  const gymSelect = e.target.closest('[data-role="gym-select"]');
  if (gymSelect) {
    state.currentGymId = gymSelect.value || null;
    persist();
    render();
  }

  // Seit v1.23.0: Wiederholungen eingetragen (Feld verlassen/bestaetigt) -> Satz automatisch
  // als erledigt markieren, Haekchen gruen faerben, Pausen-Timer starten - erspart den
  // zusaetzlichen Tipp auf das Haekchen. Nur bei der ersten Eintragung (noch nicht erledigt),
  // damit ein spaeteres Korrigieren der Wiederholungen den Timer nicht erneut auslöst; manuelles
  // Abhaken/Zuruecknehmen ueber das Haekchen bleibt unveraendert moeglich.
  const repsField = e.target.closest('[data-role="set-field"][data-field="reps"]');
  if (repsField) {
    const { day, exid, idx } = repsField.dataset;
    const ex = EXERCISES[day].find(x => x.id === exid);
    const sets = ex ? ensureDaySets(day, ex) : null;
    const s = sets ? sets[idx] : null;
    if (s && !s.done && String(s.reps).trim() !== "") {
      s.done = true;
      persist();
      render();
      startRestTimer(ex.compound ? REST_DURATION_COMPOUND : REST_DURATION_DEFAULT);
    }
  }
});

// Firebase laedt per <script type="module"> (siehe Skriptende) asynchron und komplett
// unabhaengig vom ersten Rendern - genau wie loadExerciseLibrary() unten. Schlaegt das
// Laden fehl (offline, CDN nicht erreichbar), feuert "fretzecloud-ready" nie: Login-Buttons
// bleiben sichtbar, aber ohne Funktion (siehe die window.FretzeCloud-Checks oben), kein Absturz.
window.addEventListener("fretzecloud-ready", () => {
  window.FretzeCloud.onAuthChange((user) => {
    const wasLoggedIn = !!currentUser;
    currentUser = user;
    if (user) { loginEmailFormOpen = false; reconcileCloudState(user.uid); }
    if (!user) { editNameOpen = false; adminViewActive = false; cloudSyncStatus = "idle"; }
    render();
    if (user && !wasLoggedIn) showToast(`Eingeloggt als ${user.email || user.displayName || "Konto"}.`);
    if (!user && wasLoggedIn) showToast("Ausgeloggt.");
  });
});

render();
loadExerciseLibrary();

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch((e) => console.warn("SW-Registrierung fehlgeschlagen", e));
  });
}
</script>

<!-- Konto/Login: eigener <script type="module">-Block, da das Firebase-JS-SDK per CDN-ESM-Import
     geladen wird, waehrend das Haupt-Script oben bewusst ein klassisches Script bleibt (kein
     Umbau der gesamten App auf ES-Module). Exponiert nur eine schlanke Wrapper-API auf
     window.FretzeCloud - derselbe Isolationsgedanke wie bei PROXY_URL fuer den Gemini-Worker.
     Seit v1.22.0 (Phase B) auch Firestore-Datensync (saveState/loadState) - siehe
     reconcileCloudState() im Haupt-Script fuer die Merge-Logik. -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    signInWithEmailAndPassword, createUserWithEmailAndPassword,
    onAuthStateChanged, signOut, updateProfile, sendPasswordResetEmail,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getFirestore, doc, getDoc, setDoc,
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

  // Firebase-Web-Config ist bewusst oeffentlich (anders als der Gemini-API-Key) - Sicherheit
  // kommt ueber Firebase Auth + spaetere Firestore Security Rules, nicht ueber Geheimhaltung
  // dieser Werte. Siehe CLAUDE.md "Konto/Login" fuer den Hintergrund.
  const firebaseConfig = {
    apiKey: "AIzaSyAlfxzDTi18iGPIR4xzo_2-XpCo7tHYw0Y",
    authDomain: "fretze-pumpt.firebaseapp.com",
    projectId: "fretze-pumpt",
    storageBucket: "fretze-pumpt.firebasestorage.app",
    messagingSenderId: "1039659812800",
    appId: "1:1039659812800:web:9366de3308e15b2765aa25",
  };

  try {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();

    window.FretzeCloud = {
      signInGoogle: () => signInWithPopup(auth, googleProvider),
      signInEmail: (email, password) => signInWithEmailAndPassword(auth, email, password),
      // Setzt bei Bedarf einen selbstgewaehlten Anzeigenamen direkt nach dem Anlegen des Kontos
      // und liefert (anders als signInEmail) die fertigen Nutzerdaten zurueck, statt sich auf
      // onAuthChange zu verlassen - das erste onAuthChange-Feuern koennte sonst noch den alten
      // (leeren) Anzeigenamen zeigen, da updateProfile() erst danach ablaeuft.
      signUpEmail: async (email, password, displayName) => {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        if (displayName) await updateProfile(cred.user, { displayName });
        return { uid: cred.user.uid, email: cred.user.email, displayName: cred.user.displayName };
      },
      resetPassword: (email) => sendPasswordResetEmail(auth, email),
      updateDisplayName: async (name) => {
        if (!auth.currentUser) throw new Error("Nicht eingeloggt.");
        await updateProfile(auth.currentUser, { displayName: name });
        return { uid: auth.currentUser.uid, email: auth.currentUser.email, displayName: auth.currentUser.displayName };
      },
      signOutUser: () => signOut(auth),
      onAuthChange: (cb) => onAuthStateChanged(auth, (user) => {
        cb(user ? { uid: user.uid, email: user.email, displayName: user.displayName } : null);
      }),
      // Seit v1.22.0 (Phase B): Firestore-Spiegel des kompletten state-Blobs unter users/{uid}.
      // JSON-Rundreise vor setDoc sanitisiert undefined-Felder (Firestore wirft sonst, anders
      // als JSON.stringify beim lokalen persist()).
      saveState: (uid, stateObj) => setDoc(doc(db, "users", uid), JSON.parse(JSON.stringify(stateObj))),
      loadState: async (uid) => {
        const snap = await getDoc(doc(db, "users", uid));
        return snap.exists() ? snap.data() : null;
      },
    };
    window.dispatchEvent(new CustomEvent("fretzecloud-ready"));
  } catch (e) {
    // Offline beim allerersten Laden oder CDN nicht erreichbar - graceful, kein Absturz.
    // window.FretzeCloud bleibt undefined, die Login-Buttons im Profil pruefen das vor
    // jedem Aufruf und zeigen stattdessen einen Toast statt einer Exception.
    console.warn("Firebase konnte nicht initialisiert werden:", e);
  }
</script>
