<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Fretze – Trainingsbuch</title>
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#a8461e" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Fretze" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1c1b1a;
    --surface: #242220;
    --surface2: #2d2a27;
    --border: #3d3934;
    --chalk: #ede7db;
    --chalk-dim: #a29a8c;
    --rust: #c1440e;
    --rust-dim: #7a2c09;
    --olive: #7c8f5a;
    --olive-dim: #4d5738;
    --text-zoom: 1;
  }
  :root[data-textsize="gross"] { --text-zoom: 1.15; }
  :root[data-textsize="xgross"] { --text-zoom: 1.3; }
  #app, #rest-timer-bar { zoom: var(--text-zoom); }
  :root[data-theme="sepia"] {
    --bg: #f2e8d5;
    --surface: #e9dcc0;
    --surface2: #e0d0ac;
    --border: #c9b68e;
    --chalk: #3a2f1f;
    --chalk-dim: #7d6b4e;
    --rust: #a8461e;
    --rust-dim: #d9a679;
    --olive: #5f7a3d;
    --olive-dim: #a8c48a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }
  body {
    font-family: 'Inter', sans-serif;
    color: var(--chalk);
    padding-bottom: 48px;
    -webkit-tap-highlight-color: transparent;
  }
  h1, h3, .display { font-family: 'Oswald', sans-serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  @keyframes app-fade-in { from { opacity: 0; } to { opacity: 1; } }
  #app.fade-in { animation: app-fade-in 150ms ease; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .header { padding: 22px 16px 14px; border-bottom: 1px solid var(--border); }
  .header-row { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .header-title { display: flex; align-items: center; gap: 8px; }
  .header-title h1 {
    font-weight: 600; font-size: 22px; letter-spacing: 1px;
    text-transform: uppercase; margin: 0;
  }
  .header-sub {
    color: var(--chalk-dim); font-size: 13px; margin: 4px 0 0 28px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .header-actions { display: flex; gap: 6px; flex-shrink: 0; }
  @media (max-width: 480px) {
    .header-row { flex-direction: column; align-items: stretch; }
    .header-actions { width: 100%; }
  }
  .icon-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 9px; color: var(--chalk-dim); cursor: pointer; font-size: 12px;
    font-family: 'JetBrains Mono', monospace; display: flex; align-items: center; gap: 5px;
    text-decoration: none;
  }
  .icon-btn:active { border-color: var(--rust); color: var(--chalk); }
  .backup-note { font-size: 11px; color: var(--chalk-dim); margin: 8px 16px 0; }

  .plan-row { display: flex; align-items: center; gap: 8px; margin: 14px 16px 0; }
  .plan-label {
    font-size: 11px; color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .plan-select {
    flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    color: var(--chalk); padding: 7px 9px; font-size: 13px; font-family: 'Inter', sans-serif;
  }

  .today-banner {
    margin: 14px 16px 0; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--rust-dim); background: linear-gradient(180deg, rgba(193,68,14,0.14), rgba(193,68,14,0.05));
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
  }
  .today-banner.done-today { border-color: var(--olive-dim); background: linear-gradient(180deg, rgba(124,143,90,0.14), rgba(124,143,90,0.05)); }
  .today-banner-text { font-size: 13px; color: var(--chalk-dim); }
  .today-banner-text b { color: var(--chalk); font-family: 'Oswald', sans-serif; letter-spacing: 0.3px; text-transform: uppercase; font-weight: 600; }
  .today-banner-btn {
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 7px 12px; border-radius: 7px; border: 1px solid var(--rust); background: var(--rust);
    color: #fff; cursor: pointer; flex-shrink: 0;
  }
  .today-banner.done-today .today-banner-btn { border-color: var(--olive); background: var(--olive); }

  .tabs {
    display: flex; overflow-x: auto; gap: 8px; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    flex-shrink: 0; font-family: 'Oswald', sans-serif; font-size: 14px;
    letter-spacing: 0.5px; text-transform: uppercase; padding: 8px 14px;
    border-radius: 8px; border: 1px solid var(--border); background: var(--surface);
    color: var(--chalk-dim); cursor: pointer; white-space: nowrap;
  }
  .tab-btn.active { border-color: var(--rust); background: var(--rust); color: #fff; }

  .content { padding: 16px; }
  .focus-line { margin-bottom: 14px; color: var(--chalk-dim); font-size: 13px; }
  .focus-line span { color: var(--chalk); }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 16px; margin-bottom: 14px;
  }
  .card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  /* Seit v1.55.0: Trainingsmodus stapelt Titel/Buttons statt sie nebeneinander zu zwingen - bei
     langen Uebungsnamen (z.B. "Chest-Supported Row") reichte die verbleibende Breite neben den 3
     ℹ/⟲/✎-Buttons nicht, was zu haesslichen Wortumbruechen mitten im Wort fuehrte. Gestapelt hat
     der Titel immer die volle Kartenbreite zur Verfuegung. */
  .focusmode-top { flex-direction: column; align-items: stretch; }
  .focusmode-top-actions { display: flex; gap: 6px; margin-top: 10px; }
  .card-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-title-row h3 {
    font-size: 17px; font-weight: 500; margin: 0; text-transform: uppercase; letter-spacing: 0.3px;
    min-width: 0; overflow-wrap: break-word;
  }
  .badge-core {
    font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--olive);
    border: 1px solid var(--olive-dim); border-radius: 4px; padding: 1px 5px;
  }
  .badge-swapped { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: var(--chalk-dim); }
  .target-line { font-size: 12px; color: var(--chalk-dim); margin-top: 3px; font-family: 'JetBrains Mono', monospace; }
  .history-line { font-size: 12px; color: var(--chalk-dim); margin-top: 4px; display: flex; flex-wrap: wrap; gap: 6px 10px; align-items: center; }
  .history-line b { color: var(--chalk); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  .weight-suggestion { color: var(--olive); display: inline-flex; align-items: center; gap: 6px; }
  .weight-suggestion b { color: var(--olive); }
  .band-combo-hint { color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .sync-status { font-size: 12px; color: var(--chalk-dim); }
  .sync-status.sync-ok { color: var(--olive); }
  .sync-status.sync-error { color: var(--rust); }
  .suggestion-accept-btn {
    font-size: 11px; padding: 3px 8px; border-radius: 5px; border: 1px solid var(--olive);
    background: transparent; color: var(--olive); cursor: pointer;
  }

  .swap-btn {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px; color: var(--chalk); cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    min-width: 44px; min-height: 44px;
  }
  .swap-btn.active { border-color: var(--olive); background: var(--olive); color: #fff; }
  .swap-panel {
    margin-top: 10px; padding: 10px; background: var(--surface2); border-radius: 8px;
    border: 1px solid var(--border);
  }
  .swap-panel-label {
    font-size: 11px; color: var(--chalk-dim); margin-bottom: 6px;
    font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
  }
  .swap-options { display: flex; flex-wrap: wrap; gap: 6px; }
  .swap-opt-btn {
    font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg); color: var(--chalk); cursor: pointer;
  }
  .swap-clear-btn {
    font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--rust-dim);
    background: transparent; color: var(--rust); cursor: pointer; display: flex; align-items: center; gap: 4px;
  }

  .info-panel {
    margin-top: 10px; padding: 10px; background: var(--surface2); border-radius: 8px;
    border: 1px solid var(--border); font-size: 12px; color: var(--chalk);
  }
  .info-line { margin-bottom: 8px; }
  .info-dim { color: var(--chalk-dim); }
  .info-sublabel {
    font-size: 11px; color: var(--chalk-dim); margin: 8px 0 4px;
    font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
  }
  .info-list { margin: 0; padding-left: 18px; }
  .info-list li { margin-bottom: 4px; }
  .info-safety {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);
    color: var(--rust-dim);
  }

  .collapsible-section {
    margin-bottom: 12px; border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface); overflow: hidden;
  }
  .collapsible-toggle {
    width: 100%; text-align: left; background: transparent; border: none;
    padding: 12px 14px; font-family: 'Oswald', sans-serif; font-size: 14px;
    letter-spacing: 0.3px; color: var(--chalk); cursor: pointer;
    display: flex; justify-content: space-between; align-items: center;
  }
  .collapsible-body { padding: 0 14px 14px; font-size: 12px; color: var(--chalk); }
  .collapsible-line { margin-bottom: 6px; }
  .collapsible-sublabel {
    font-size: 11px; color: var(--chalk-dim); margin: 10px 0 4px;
    font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
  }
  .collapsible-list { margin: 0; padding-left: 18px; }
  .collapsible-list li { margin-bottom: 6px; }
  .collapsible-reps { color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .collapsible-cue { color: var(--chalk-dim); font-size: 11px; }
  .collapsible-note {
    margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border);
    color: var(--chalk-dim); font-size: 11px; font-style: italic;
  }

  .ai-suggest-panel { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
  .ai-suggest-btn {
    font-size: 12px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--olive-dim);
    background: transparent; color: var(--olive); cursor: pointer;
  }
  .ai-suggest-btn:disabled { opacity: 0.6; cursor: default; }
  .ai-suggest-status { font-size: 12px; color: var(--chalk-dim); }
  .ai-suggest-error { font-size: 12px; color: var(--rust); }
  .ai-opt-btn {
    display: block; width: 100%; text-align: left; margin-top: 6px;
    font-size: 12px; padding: 7px 10px; border-radius: 6px; border: 1px solid var(--olive-dim);
    background: var(--bg); color: var(--chalk); cursor: pointer;
  }
  .ai-opt-reason { display: block; font-size: 11px; color: var(--chalk-dim); margin-top: 2px; }

  .set-header {
    display: grid; grid-template-columns: 20px 1.5fr 0.9fr 40px 40px; gap: 6px;
    font-size: 10px; color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace;
    text-transform: uppercase; margin: 12px 0 5px; padding-left: 2px;
  }
  .set-header-icon { text-align: center; }
  .set-row {
    display: grid; grid-template-columns: 20px 1.5fr 0.9fr 40px 40px; gap: 6px;
    align-items: center; margin-bottom: 6px;
  }
  .set-idx { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--chalk-dim); }
  .set-input {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; color: var(--chalk);
    padding: 7px 5px; width: 100%; min-width: 0;
  }
  .set-value {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--chalk);
    padding: 7px 8px; display: block;
  }
  .couldmore-toggle {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    border-radius: 5px; border: 1px solid var(--border); background: transparent;
    color: var(--chalk-dim); cursor: pointer; min-width: 40px; min-height: 40px;
    display: flex; align-items: center; justify-content: center; opacity: 0.5;
  }
  .couldmore-toggle.active { border-color: var(--olive); background: var(--olive); color: #fff; opacity: 1; }
  .done-btn {
    width: 40px; height: 40px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; color: #fff; font-size: 13px;
  }
  .done-btn.done { border-color: var(--olive); background: var(--olive); }

  .set-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .tally { display: inline-flex; gap: 6px; }
  .tally-group { display: inline-flex; position: relative; }
  .tally-stroke { display: inline-block; width: 2px; height: 14px; background: var(--rust); margin-right: 3px; }
  .tally-stroke:last-child { margin-right: 0; }
  .tally-slash {
    position: absolute; left: -1px; top: -1px; width: 22px; height: 16px;
    border-top: 2px solid var(--rust); transform: rotate(-30deg); transform-origin: left top;
  }
  .set-count { font-size: 11px; color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace; }

  .note-input {
    margin-top: 10px; width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; color: var(--chalk); font-size: 12px; font-family: 'Inter', sans-serif;
    padding: 7px 9px; resize: vertical; min-height: 34px;
  }

  .finish-btn {
    width: 100%; margin-top: 6px; padding: 13px; border-radius: 9px; border: none;
    background: var(--rust); color: #fff; font-family: 'Oswald', sans-serif; font-size: 15px;
    letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center;
    justify-content: center; gap: 6px; cursor: pointer;
  }
  .toast {
    position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%);
    max-width: 90%; padding: 10px 16px; background: var(--surface2);
    border: 1px solid var(--olive-dim); border-radius: 8px; font-size: 12px; color: var(--olive);
    display: none; z-index: 60; box-shadow: 0 4px 16px rgba(0,0,0,0.35); text-align: center;
  }
  .toast.show { display: block; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    align-items: center; justify-content: center; z-index: 200; padding: 20px;
    display: none;
  }
  .modal-overlay:not(:empty) { display: flex; }
  .modal-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; max-width: 360px; width: 100%;
  }
  .modal-title { font-family: 'Oswald', sans-serif; font-size: 18px; margin: 0 0 8px; color: var(--chalk); }
  .modal-message { font-size: 13px; color: var(--chalk-dim); margin: 0 0 14px; line-height: 1.4; }
  .modal-input {
    font-family: 'JetBrains Mono', monospace; font-size: 14px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 6px; color: var(--chalk);
    padding: 10px; width: 100%; margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn {
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.3px;
    padding: 10px 16px; border-radius: 8px; cursor: pointer; min-height: 44px;
  }
  .modal-btn-cancel { background: transparent; border: 1px solid var(--border); color: var(--chalk-dim); }
  .modal-btn-confirm { background: var(--olive); border: 1px solid var(--olive); color: #fff; }
  .modal-btn-danger { background: var(--rust); border: 1px solid var(--rust); color: #fff; }
  .modal-date-label { display: block; font-size: 12px; color: var(--chalk-dim); margin-bottom: 4px; }
  .modal-date-label .modal-input { margin-top: 4px; }
  .modal-choice-options { display: flex; gap: 8px; margin-bottom: 14px; }
  .modal-choice-btn {
    flex: 1; padding: 14px 8px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--chalk); font-size: 20px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; min-height: 44px;
  }
  .modal-choice-btn:active { border-color: var(--olive); }

  .gym-icon-btn {
    background: none; border: none; cursor: pointer; color: inherit;
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 32px; min-height: 32px; border-radius: 6px;
  }
  .gym-icon-btn.danger { color: var(--rust); }

  .focusmode-enter-btn {
    width: 100%; margin: 0 0 16px; padding: 12px; border-radius: 9px; border: 1px solid var(--rust);
    background: transparent; color: var(--rust); font-family: 'Oswald', sans-serif; font-size: 14px;
    letter-spacing: 0.4px; text-transform: uppercase; cursor: pointer; display: flex;
    align-items: center; justify-content: center; gap: 6px;
  }
  .focusmode-topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
  }
  .focusmode-exit-btn {
    background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    padding: 7px 10px; color: var(--chalk-dim); cursor: pointer; font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }
  .focusmode-progress { font-size: 12px; color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace; }
  .focusmode-content { padding: 16px; }
  .focusmode-title-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; min-width: 0; }
  .focusmode-title {
    font-family: 'Oswald', sans-serif; font-size: clamp(22px, 8vw, 32px); font-weight: 600;
    letter-spacing: 0.3px; text-transform: uppercase; margin: 0; line-height: 1.15;
    min-width: 0; max-width: 100%; overflow-wrap: break-word;
  }
  .focusmode-target { font-size: 13px; color: var(--chalk-dim); margin-top: 4px; font-family: 'JetBrains Mono', monospace; }
  .focusmode-next {
    margin-top: 16px; padding: 10px 14px; border-radius: 9px; border: 1px dashed var(--border);
    font-size: 12px; color: var(--chalk-dim);
  }
  .focusmode-next b { color: var(--chalk); font-weight: 500; }
  .focusmode-nav {
    display: flex; gap: 8px; margin-top: 16px;
    position: sticky; bottom: 0; padding: 10px 0 4px; background: var(--bg);
  }
  .focusmode-nav-btn {
    flex: 1; padding: 15px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--surface); color: var(--chalk); font-family: 'Oswald', sans-serif;
    font-size: 14px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .focusmode-nav-btn:disabled { opacity: 0.4; cursor: default; }
  .focusmode-nav-btn.primary { background: var(--rust); border-color: var(--rust); color: #fff; }
  .focusmode-nav-btn.finish { background: var(--olive); border-color: var(--olive); color: #fff; }

  .journal-empty { padding: 20px 4px; color: var(--chalk-dim); font-size: 13px; }
  .streak-banner {
    display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap;
    padding: 10px 14px; margin-bottom: 14px; border-radius: 9px;
    border: 1px solid var(--rust-dim); background: linear-gradient(180deg, rgba(193,68,14,0.14), rgba(193,68,14,0.05));
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: var(--chalk);
  }
  .streak-best { font-size: 11px; color: var(--chalk-dim); font-family: 'JetBrains Mono', monospace; }
  .journal-entry-header {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
    margin-bottom: 8px; flex-wrap: wrap;
  }
  .journal-entry-date {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--chalk-dim);
  }
  .journal-entry-delete {
    background: transparent; border: none; color: var(--chalk-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px;
    flex-shrink: 0;
  }
  .journal-entry-day {
    font-family: 'Oswald', sans-serif; font-size: 13px; letter-spacing: 0.3px;
    text-transform: uppercase; color: var(--chalk);
  }
  .journal-ex-line { font-size: 13px; margin-bottom: 4px; }
  .journal-ex-line i { color: var(--chalk-dim); font-style: italic; }
  .journal-session-note {
    margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border);

// PLANS bleibt unveraendert (nur die 4 eingebauten Plaene) - eigene Plaene kommen aus
// state.customPlans und werden hier nur zur Laufzeit angehaengt, nie in PLANS gemischt.
function getAllPlans() {
  return [...PLANS, ...state.customPlans];
}

function applyPlan(planId) {
  const plan = getAllPlans().find(p => p.id === planId) || PLANS[0];
  DAYS = plan.days;
  EXERCISES = plan.exercises;
}

// siehe unten) - so kann die Datenbank wachsen, ohne index.html aufzublaehen oder einen
// APP_VERSION-Bump zu brauchen. exerciseLibrary ist keyed nach stabiler Content-ID (Slug aus
// dem Namen, z.B. "flachbankdruecken-kurzhantel"), NICHT nach Plan-Slot-ID - dadurch koennen
// mehrere Plan-Slots (z.B. dieselbe Uebung in verschiedenen Plaenen) dieselbe Erklaerung teilen,
// statt sie zu duplizieren. Exercise-Objekte verweisen darauf ueber das optionale Feld
// ex.libraryId (kein libraryId = kein ℹ-Button, gleiche Graceful-Degradation wie zuvor).
let exerciseLibrary = {};

async function loadExerciseLibrary() {
  try {
    const res = await fetch("exercise-library.json");
    exerciseLibrary = await res.json();
  } catch (e) { /* offline beim allerersten Laden ohne Cache - graceful, einfach keine Infos */ }
  render();
}

// Gym-Standorte: state.currentGymId === null bedeutet "kein Gym" und nutzt weiterhin die
// flachen state.lastWeights/state.history-Objekte unverändert (kein Fallback zwischen Gyms,
// bewusst sauber getrennt, damit sich Gewichte verschiedener Studios nicht vermischen).
function getLastWeights(exId) {
  if (state.currentGymId) {
    const gymData = state.gymLastWeights[state.currentGymId];
    return (gymData && gymData[exId]) || [];
  }
  return state.lastWeights[exId] || [];
}

function setLastWeights(exId, arr) {
  if (state.currentGymId) {
    if (!state.gymLastWeights[state.currentGymId]) state.gymLastWeights[state.currentGymId] = {};
    state.gymLastWeights[state.currentGymId][exId] = arr;
  } else {
    state.lastWeights[exId] = arr;
  }
}

function getHistoryEntry(exId) {
  if (state.currentGymId) {
    const gymData = state.gymHistory[state.currentGymId];
    return gymData ? gymData[exId] : undefined;
  }
  return state.history[exId];
}

function setHistoryEntry(exId, entry) {
  if (state.currentGymId) {
    if (!state.gymHistory[state.currentGymId]) state.gymHistory[state.currentGymId] = {};
    state.gymHistory[state.currentGymId][exId] = entry;

}

// Plan-übergreifende Gewichts-/Verlaufs-Übernahme (seit v1.53.0): jede Übung hat pro Plan eine
// eigene Slot-ID (bewusst so, damit Plan-Wechsel keine Daten verliert, siehe CLAUDE.md "Data
// model") - dieselbe reale Übung (z.B. "Kniebeugen mit der Langhantel" in Upper/Lower, Ganzkörper
// UND Bro-Split) hat dadurch mehrere, komplett getrennte exId-Einträge in state.lastWeights/
// state.history. Ohne diese Funktion würde man beim ersten Mal in einem neuen Plan wieder bei 0
// anfangen, obwohl man dieselbe Übung in einem anderen Plan schon x-mal gemacht hat. Die stabile,
// plan-unabhängige libraryId (seit v1.16.0, ohnehin schon für die ℹ-Erklärung gedacht) ist die
// einzige verlässliche Klammer zwischen den Slot-IDs. Bleibt innerhalb der bestehenden Gym-Grenze
// (getLastWeights/getHistoryEntry selbst filtern schon nach state.currentGymId) - kein Fallback
// zwischen Gyms, gleiche Begründung wie dort. Nimmt bewusst den ERSTEN Treffer über getAllPlans()
// (keine Zeitstempel pro Gewichts-/Verlaufs-Eintrag vorhanden, um "jüngste Nutzung" zu bestimmen) -
// einfachste Definition, gleiche "computed on demand, austauschbar ohne Migration"-Konvention wie
// z.B. computePersonalRecords()' PR-Definition.
//
// effectiveLibraryId() (seit v1.59.1): ein per ⟲ getauschter Slot behält seine ursprüngliche
// libraryId (state.swaps speichert nur den angezeigten Namen, siehe swap-select-Handler) - ohne
// diese Auflösung würde z.B. Push Bs "Schrägbankdrücken Maschine", getauscht zu "Schrägbankdrücken
// Kurzhantel", niemals mit Push As gleichnamiger, eigener Übung (andere libraryId) verknüpft, weil
// otherExIdsSharingLibraryId() stur die (falsche) Maschinen-libraryId des Original-Slots vergliche.
// Löst den getauschten Anzeigenamen zuerst über libraryIdForName() auf; kein Treffer (freier Text,
// oder Name nicht in exerciseLibrary) fällt auf ex.libraryId zurück, exakt wie zuvor.
function effectiveLibraryId(day, ex) {
  const displayName = state.swaps[`${day}:${ex.id}`];
  if (displayName) {
    const swappedLibraryId = libraryIdForName(displayName);
    if (swappedLibraryId) return swappedLibraryId;
  }
  return ex.libraryId;
}

function otherExIdsSharingLibraryId(day, ex) {
  const libraryId = effectiveLibraryId(day, ex);
  if (!libraryId) return [];
  const ids = [];
  for (const plan of getAllPlans()) {
    for (const dayId of Object.keys(plan.exercises)) {
      for (const otherEx of plan.exercises[dayId]) {
        if (otherEx.id !== ex.id && otherEx.libraryId === libraryId) ids.push(otherEx.id);
      }
    }
  }
  for (const dayId of Object.keys(state.extraExercises)) {
    for (const otherEx of state.extraExercises[dayId]) {
      if (otherEx.id !== ex.id && otherEx.libraryId === libraryId) ids.push(otherEx.id);
    }
  }
  return ids;
}

function findCrossPlanLastWeights(day, ex) {
  for (const id of otherExIdsSharingLibraryId(day, ex)) {
    const weights = getLastWeights(id);
    if (weights.length) return weights;
  }
  return null;
}

function findCrossPlanHistoryEntry(day, ex) {
  for (const id of otherExIdsSharingLibraryId(day, ex)) {
    const hist = getHistoryEntry(id);
    if (hist) return hist;
  }
  return null;
}

// exId-Parameter seit v1.53.0 zu ex (volles Objekt) erweitert - wird fuer den libraryId-Zugriff
// oben gebraucht, alle bestehenden Aufrufstellen hatten `ex` ohnehin schon im Scope. day-Parameter
// seit v1.59.1 dazugekommen (siehe effectiveLibraryId() oben) - alle Aufrufstellen hatten die
// Day-ID ebenfalls schon im Scope.
function buildInitialSets(day, ex, n) {
  let weights = getLastWeights(ex.id);
  if (weights.length === 0) {
    const crossPlanWeights = findCrossPlanLastWeights(day, ex);
    if (crossPlanWeights) weights = crossPlanWeights;
  }
  return Array.from({ length: n }, (_, i) => ({
    weight: weights[i] !== undefined ? weights[i] : (weights.length ? weights[weights.length - 1] : ""),
    reps: "",
    isWarmup: false,
    couldDoMore: false,
    done: false,
  }));
}

function addGym(name) {
  const trimmed = (name || "").trim();
  if (!trimmed) return;
  state.gyms.push({ id: "gym_" + Date.now(), name: trimmed });
  persist();
  render();
}

function renameGym(id, name) {
  const trimmed = (name || "").trim();
  if (!trimmed) return;
  const gym = state.gyms.find(g => g.id === id);
  if (gym) gym.name = trimmed;
  persist();
  render();
}

function deleteGym(id) {
  state.gyms = state.gyms.filter(g => g.id !== id);
  if (state.currentGymId === id) state.currentGymId = null;
  persist();
  render();
}

// Tagebuch: state.journal ist eine flache chronologische Liste (nicht gym-gescoped - ein PR
// ist ein PR, egal in welchem Studio). PRs/Chart-Daten werden bewusst NICHT gespeichert,
// sondern bei Bedarf aus state.journal abgeleitet (computePersonalRecords) - so bleibt die
// PR-Definition jederzeit aenderbar, ohne Datenmodell/Migration anzufassen.
function addJournalEntry(entry) {
  state.journal.push(entry);
}

// Geschaetztes Einer-Wiederholungs-Maximum nach Epley (seit v1.31.0, ersetzt reines
// Maximalgewicht als PR-Definition) - bewusst Epley statt Brzycki gewaehlt, da Brzycki bei
// Wiederholungszahlen >= 37 negativ/undefiniert wird (in dieser App realistisch bei sehr
// hochrepetitiven Isolationsuebungen), waehrend Epley fuer beliebige Wiederholungszahlen
// stabil bleibt. Nicht-numerische reps (z.B. "12/Seite") liefern das reine Gewicht zurueck -
// graceful, kein Absturz, gleiche Konvention wie parseRepRange().
function estimateOneRepMax(weight, reps) {
  const repsNum = parseFloat(reps);
  if (!Number.isFinite(repsNum) || repsNum <= 0) return weight;
  return weight * (1 + repsNum / 30);
}

// PR-Definition seit v1.31.0: hoechstes geschaetztes 1RM statt reines Maximalgewicht - ein
// leichteres Gewicht fuer mehr Wiederholungen kann jetzt einen schwereren Satz mit weniger
// Wiederholungen als "staerkere" Leistung uebertreffen. Weiterhin abgeleitet, nicht gespeichert
// (siehe CLAUDE.md) - die Definition konnte deshalb ohne Migration geaendert werden.
function computePersonalRecords() {
  const records = {};
  state.journal.forEach(entry => {
    entry.exercises.forEach(ex => {
      ex.sets.forEach(s => {
        if (s.isWarmup) return;
        const weight = parseWeightNum(s.weight);
        if (!Number.isFinite(weight)) return;
        const e1rm = estimateOneRepMax(weight, s.reps);
        const current = records[ex.exId];
        if (!current || e1rm > current.e1rm) {
          records[ex.exId] = { exId: ex.exId, name: ex.name, weight, reps: s.reps, date: entry.date, timestamp: entry.timestamp, e1rm };
        }
      });
    });
  });
  return records;
}

// Wochenvolumen-Dashboard (seit v1.18.0): wie computePersonalRecords oben wird nichts
// zusaetzlich gespeichert, sondern bei Bedarf aus state.journal + exerciseLibrary abgeleitet.
// MUSCLE_GROUPS ist die kanonische, feste Reihenfolge (grob anatomisch von oben nach unten),
// in der alle Gruppen angezeigt werden - auch mit 0 Saetzen, damit Luecken sichtbar sind.
const MUSCLE_GROUPS = ["Brust", "Rücken", "Schultern", "Bizeps", "Trizeps", "Quadrizeps", "Beinbeuger", "Gesäß", "Waden", "Bauch"];

// state.journal speichert nur die Plan-Slot-exId, nicht die libraryId - diese Funktion sucht
// die urspruengliche Uebungsdefinition ueber alle Plaene (eingebaut + eigene) anhand der exId,
// da IDs plan-uebergreifend eindeutig sind (siehe CLAUDE.md). Liefert null, wenn die Uebung
// zwischenzeitlich aus einem bearbeiteten/geloeschten eigenen Plan entfernt wurde - graceful,
// kein Absturz, der Satz zaehlt dann einfach als "nicht zuordenbar".
function findExerciseDefById(exId) {
  for (const plan of getAllPlans()) {
    for (const dayId of Object.keys(plan.exercises)) {
      const found = plan.exercises[dayId].find(ex => ex.id === exId);
      if (found) return found;
    }
  }
  // Seit v1.43.0: Extra-Uebungen (frei zu bestehenden Tagen hinzugefuegt) sind kein Teil
  // irgendeines Plans, muessen daher separat durchsucht werden - sonst zaehlen sie im
  // Wochenvolumen-Dashboard dauerhaft als "nicht zuordenbar".
  for (const dayId of Object.keys(state.extraExercises)) {
    const found = state.extraExercises[dayId].find(ex => ex.id === exId);
    if (found) return found;
  }
  return null;
}

// YYYY-MM-DD im lokalen Zeitzone (nicht toISOString(), das wuerde bei einem UTC-Versatz auf den
// falschen Kalendertag rutschen) - fuer das <input type="date">-Feld beim Nachtragen (v1.50.0).
function todayISODate() {
  const d = new Date();
  const pad = (n) => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
}

// Kombiniert das im Nachtragen-Datumsfeld gewaehlte Kalenderdatum mit der echten aktuellen Uhrzeit,
// statt fest auf "12:00" zu stempeln - sonst haetten mehrere Abschluesse am selben (ggf.
// nachgetragenen) Tag alle exakt denselben Timestamp bekommen (Kollision, da defaultDate immer
// "heute" ist, das Feld also bei jedem normalen Abschluss unveraendert "heute" mitschickt). Der
// Timestamp bleibt so weiterhin eindeutig pro Abschluss (wichtig fuer journal-delete-entry und
// mergeJournals()' Dedup-per-Timestamp), waehrend der Kalendertag trotzdem korrekt uebernommen wird.
function dateOverrideToRefDate(dateOverride) {
  const now = new Date();
  if (!dateOverride) return now;
  const [y, m, d] = dateOverride.split("-").map(Number);
  return new Date(y, m - 1, d, now.getHours(), now.getMinutes(), now.getSeconds(), now.getMilliseconds());
}

function getWeekStart(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay(); // 0 = Sonntag .. 6 = Samstag
  const diffToMonday = day === 0 ? 6 : day - 1;
  d.setDate(d.getDate() - diffToMonday);
  return d;
}

// Zaehlt bewusst 1 Satz = 1 Volumen-Punkt fuer die primaere Muskelgruppe, ohne MJ/SJ-fraktionale
// Anrechnung auf Sekundaermuskeln (siehe 01_Recherchen/01_Trainingsplaene/Trainingswissenschaft-
// Uebungsauswahl.md) - bewusste Vereinfachung fuer die erste Version.
// Seit v1.36.0 in eine wiederverwendbare Bereichs-Funktion ausgelagert, damit sowohl die aktuelle
// Woche (computeWeeklyVolume) als auch der Mehrwochen-Trend (computeVolumeTrend) dieselbe Logik
// nutzen, statt sie zu duplizieren.
function computeWeeklyVolumeForRange(weekStart, weekEnd) {
  const counts = {};
  MUSCLE_GROUPS.forEach(g => { counts[g] = 0; });
  let unattributed = 0;
  state.journal.forEach(entry => {
    if (entry.timestamp < weekStart.getTime() || entry.timestamp >= weekEnd.getTime()) return;
    entry.exercises.forEach(ex => {
      const def = findExerciseDefById(ex.exId);
      const info = def && def.libraryId ? exerciseLibrary[def.libraryId] : null;
      const group = info ? info.muscleGroup : null;
      ex.sets.forEach(s => {
        if (s.isWarmup) return;
        if (group && counts.hasOwnProperty(group)) counts[group]++;
        else unattributed++;
      });
    });
  });
  return { counts, unattributed };
}

// Seit v1.52.0 rollierend (letzte 7 Tage bis jetzt) statt feste Mo-So-Kalenderwoche - Nutzer-
// Feedback: eine feste Kalenderwoche zeigt z.B. dienstags nur 2 Tage Trainingsdaten und wirkt
// dadurch kuenstlich niedrig, obwohl in den letzten 7 echten Tagen durchaus regelmaessig
// trainiert wurde. `weekEnd` ist bewusst "jetzt" (nicht Tagesende), `weekStart` exakt 7*24h davor -
// computeWeeklyVolumeForRange() selbst ist bereits bereichs-generisch, brauchte keine Aenderung.
// Der Streak-Zaehler (computeTrainingStreaks()) bleibt bewusst bei echten Kalenderwochen (siehe
// dort) - "jede Woche mindestens 1x trainiert" ist als Konsistenz-Kennzahl an echten Wochen
// verankert, waehrend das Volumen-Dashboard von einem gleitenden Fenster profitiert.
function computeWeeklyVolume() {
  const weekEnd = new Date();
  const weekStart = new Date(weekEnd.getTime() - 7 * 24 * 60 * 60 * 1000);
  const { counts, unattributed } = computeWeeklyVolumeForRange(weekStart, weekEnd);
  return { counts, unattributed, weekStart };
}

// Mehrwochen-Trend (seit v1.36.0): letzte VOLUME_TREND_WEEKS rollierende 7-Tage-Fenster (seit
// v1.52.0, vorher feste Kalenderwochen - siehe computeWeeklyVolume()), je um 7 Tage versetzt,
// aeltestes Fenster zuerst - damit hilft das Dashboard, strukturelles Unter-/Uebertraining ueber
// die Zeit zu erkennen statt nur eine Momentaufnahme zu zeigen.
const VOLUME_TREND_WEEKS = 8;

function computeVolumeTrend() {
  const now = new Date();
  const weeks = [];
  for (let i = VOLUME_TREND_WEEKS - 1; i >= 0; i--) {
    const weekEnd = new Date(now.getTime() - i * 7 * 24 * 60 * 60 * 1000);
    const weekStart = new Date(weekEnd.getTime() - 7 * 24 * 60 * 60 * 1000);
    const { counts } = computeWeeklyVolumeForRange(weekStart, weekEnd);
    weeks.push({ weekStart, counts });
  }
  return weeks;
}

// Kleine, abhaengigkeitsfreie Inline-SVG-Sparkline (kein Chart-Framework im Projekt).
function sparklineSVG(points) {
  if (points.length < 2) {
    return '<div class="sparkline-empty">Noch nicht genug Daten für einen Verlauf.</div>';
  }
  const recent = points.slice(-15);
  const weights = recent.map(p => p.weight);
  const min = Math.min(...weights);
  const max = Math.max(...weights);
  const w = 240, h = 48, pad = 4;
  const range = max - min || 1;
  const coords = recent.map((p, i) => {
    const x = pad + (i / (recent.length - 1)) * (w - pad * 2);
    const y = h - pad - ((p.weight - min) / range) * (h - pad * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  return `
    <svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${coords.join(" ")}" fill="none" stroke="var(--rust)" stroke-width="2" />
    </svg>
  `;
}

// Laedt einen bestehenden eigenen Plan zum Bearbeiten in den Entwurf - Tage/Uebungen
// behalten ihre bestehende id (wichtig, damit History/Gewichte/Notizen dieser Uebungen
// beim Speichern nicht verwaist werden), neu hinzugefuegte Zeilen bekommen erst beim
// Speichern eine id (siehe buildPlanFromDraft).
function startEditingPlan(planId) {
  const plan = state.customPlans.find(p => p.id === planId);
  if (!plan) return;
  state.planDraft = {
    editingPlanId: plan.id,

    })),

}

// Seit v1.54.0: "Plan kopieren & bearbeiten" - im Unterschied zu startEditingPlan() (a) jeder Plan
// aus getAllPlans() ist Ausgangspunkt, nicht nur eigene, und (b) es wird bewusst KEINE id
// mitkopiert (weder Tag noch Uebung) - dadurch vergibt buildPlanFromDraft() beim Speichern
// automatisch frische custom_...-IDs fuer alles, der Fork wird so zu einem komplett eigenstaendigen
// Plan, ohne dass die bestehende ID-Vergabe angefasst werden muss. Uebernimmt neben Basis-Uebungen
// auch bereits vorhandene Extra-Uebungen des Tages (state.extraExercises, seit v1.43.0) - was man
// gerade in der Karte sieht, landet auch in der Kopie. Aktive ⟲-Tauschs werden bewusst NICHT
// eingebacken (Fork kopiert die Plan-Definition, nicht die Session-Overlay - Tauschs bleiben ein
// eigenstaendiges Konzept, das nach dem Fork unter neuen IDs ohnehin nicht mehr greifen wuerde).
function startForkingPlan(planId) {
  const plan = getAllPlans().find(p => p.id === planId);
  if (!plan) return;
  const label = currentUser && currentUser.displayName
    ? `${possessiveName(currentUser.displayName)} ${plan.label}`
    : `${plan.label} (Kopie)`;
  state.planDraft = {
    editingPlanId: null,
    label,
    days: plan.days.map(d => {
      const dayExercises = [...(plan.exercises[d.id] || []), ...(state.extraExercises[d.id] || [])];
      return {
        label: d.label,
        exercises: dayExercises.map(ex => ({
          name: ex.name,
          sets: ex.sets,
          reps: ex.reps,
          alts: ex.alts || [],
          core: !!ex.core,
          ...(ex.compound ? { compound: true } : {}),
          ...(ex.libraryId ? { libraryId: ex.libraryId } : {}),
        })),
      };
    }),
  };
  planBuilderActive = true;
  persist();
  render();
}

}

function draftRemoveDay(dayIdx) {
  state.planDraft.days.splice(dayIdx, 1);
}

function draftAddExercise(dayIdx) {
  state.planDraft.days[dayIdx].exercises.push({ name: "", sets: 3, reps: "8-10" });
}

function draftRemoveExercise(dayIdx, exIdx) {

}

// Reihenfolge aendern (seit v1.44.0) ueber ▲/▼-Buttons statt Drag&Drop - vertauscht die Uebung
// mit ihrem Nachbarn, No-Op an den Raendern.
function draftMoveExercise(dayIdx, exIdx, direction) {
  const list = state.planDraft.days[dayIdx].exercises;
  const targetIdx = exIdx + direction;
  if (targetIdx < 0 || targetIdx >= list.length) return;
  [list[exIdx], list[targetIdx]] = [list[targetIdx], list[exIdx]];
}

function validatePlanDraft(draft) {
  if (!draft.label.trim()) return false;
  if (draft.days.length === 0) return false;
  return draft.days.every(d => d.label.trim() && d.exercises.length > 0 && d.exercises.every(ex => ex.name.trim() && ex.sets > 0 && ex.reps.trim()));
}

// Zeitstempel-basierte IDs garantieren by construction keine Kollision mit den ~90 fest
// eingebauten Uebungs-/Tag-IDs - state.history/state.lastWeights/state.swaps/state.notes sind
// global nach ex.id geschluesselt, es gibt keinen anderen Kollisionsschutz.
// Beim Bearbeiten (draft.editingPlanId gesetzt) behalten Tage/Uebungen mit vorhandener id
// diese id (History/Gewichte bleiben verknuepft); nur neu hinzugefuegte Zeilen (ohne id)
// bekommen eine frische, fortlaufende id oberhalb der bereits vorhandenen Nummern.
function nextIndexFor(prefix, existingIds) {
  let max = 0;
  const re = new RegExp(`^${prefix}(\\d+)$`);
  existingIds.forEach(id => {
    const m = re.exec(id);
    if (m) max = Math.max(max, Number(m[1]));
  });
  return max + 1;
}

function buildPlanFromDraft(draft) {
  const planId = draft.editingPlanId || `custom_${Date.now()}`;
  const existingDayIds = draft.days.filter(d => d.id).map(d => d.id);
  const existingExIds = draft.days.flatMap(d => d.exercises.filter(ex => ex.id).map(ex => ex.id));
  let dayCounter = nextIndexFor(`${planId}_day`, existingDayIds);
  let exCounter = nextIndexFor(`${planId}_ex`, existingExIds);

  const days = draft.days.map(d => ({
    id: d.id || `${planId}_day${dayCounter++}`,
    label: d.label.trim(),
    sub: d.label.trim(),
  }));
  const exercises = {};
  draft.days.forEach((d, dayIdx) => {
    // alts/core/compound seit v1.54.0 aus dem Entwurf uebernommen statt hart geleert - fuer von
    // Hand im Builder erstellte Uebungen (diese Felder existieren dort nie auf dem Entwurf)
    // exakt dasselbe Verhalten wie zuvor; fuer geforkte Plaene (startForkingPlan()) bleiben
    // ⟲-Alternativen, CORE-Badge und die hoehere Grundübungs-Progressions-% dadurch erhalten.
    exercises[days[dayIdx].id] = d.exercises.map(ex => ({
      id: ex.id || `${planId}_ex${exCounter++}`,
      name: ex.name.trim(),
      sets: Number(ex.sets) || 1,
      reps: ex.reps.trim(),
      alts: Array.isArray(ex.alts) ? ex.alts : [],
      core: !!ex.core,
      ...(ex.compound ? { compound: true } : {}),
      ...(ex.libraryId ? { libraryId: ex.libraryId } : {}),
    }));
  });
  return { id: planId, label: draft.label.trim(), days, exercises };
}

function savePlanDraft() {
  if (!validatePlanDraft(state.planDraft)) {
    showToast("Bitte Plan-Name, mindestens einen Tag und je Tag mindestens eine vollständige Übung angeben.");
    return;
  }
  const wasEditing = !!state.planDraft.editingPlanId;
  const plan = buildPlanFromDraft(state.planDraft);
  if (wasEditing) {
    const idx = state.customPlans.findIndex(p => p.id === plan.id);
    if (idx !== -1) state.customPlans[idx] = plan; else state.customPlans.push(plan);
  } else {
    state.customPlans.push(plan);
  }
  state.planDraft = null;
  state.currentPlan = plan.id;
  applyPlan(plan.id);
  state.currentDay = DAYS[0].id;
  planBuilderActive = false;
  exPickerActive = false;
  persist();
  render();
  showToast(wasEditing ? "Plan aktualisiert." : "Plan gespeichert.");
}

function cancelPlanDraft() {
  state.planDraft = null;
  planBuilderActive = false;
  exPickerActive = false;
  persist();
  render();
}

function deleteCustomPlan(planId) {
  state.customPlans = state.customPlans.filter(p => p.id !== planId);
  if (state.currentPlan === planId) {
    state.currentPlan = PLANS[0].id;
    applyPlan(state.currentPlan);
    state.currentDay = DAYS[0].id;
  }
  persist();
  render();
}

// das bei einem Gym passt, muss bei einem anderen nicht passen), aber nicht-destruktiv -
// ein Vorschlag wird nie automatisch uebernommen, nur als Chip angezeigt.
function getWeightSuggestion(exId) {
  if (state.currentGymId) {
    const gymData = state.gymWeightSuggestions[state.currentGymId];
    return gymData ? gymData[exId] : undefined;
  }
  return state.weightSuggestions[exId];
}

function setWeightSuggestion(exId, entry) {
  if (state.currentGymId) {
    if (!state.gymWeightSuggestions[state.currentGymId]) state.gymWeightSuggestions[state.currentGymId] = {};
    state.gymWeightSuggestions[state.currentGymId][exId] = entry;
  } else {
    state.weightSuggestions[exId] = entry;
  }
}

function clearWeightSuggestion(exId) {
  if (state.currentGymId) {
    if (state.gymWeightSuggestions[state.currentGymId]) delete state.gymWeightSuggestions[state.currentGymId][exId];
  } else {
    delete state.weightSuggestions[exId];
  }
}

// Gewichtsfeld ist type="text" statt type="number" (siehe setsRowsHTML), damit die deutsche
// Dezimalschreibweise mit Komma ("12,5") ueberhaupt eintippbar ist - manche mobilen Browser
// blockieren bei type="number" jede weitere Eingabe, sobald ein Komma einen ungueltigen
// Zahlenwert erzeugt. parseFloat() allein versteht nur den Punkt als Dezimaltrenner, daher hier
// zentral normalisiert statt an jeder parseFloat(s.weight)-Stelle einzeln.
function parseWeightNum(str) {
  return parseFloat(String(str ?? "").trim().replace(",", "."));
}

// Erkennt nur eindeutige Zahlen-Wiederholungsspannen ("6-8" -> {min:6,max:8}, "10" -> {min:10,max:10}).
// Alles andere (Freitext wie "12/Seite", "max", Zeit-/Distanzangaben wie "30-45s"/"30-40m")
// liefert bewusst null statt zu raten - die Frage wird fuer solche Uebungen einfach nicht gestellt.
function parseRepRange(str) {
  const match = /^(\d+)(?:-(\d+))?$/.exec(String(str || "").trim());
  if (!match) return null;
  const min = Number(match[1]);
  const max = match[2] !== undefined ? Number(match[2]) : min;
  return { min, max };
}

// Prozentual statt fester kg-Schritte (skaliert automatisch mit dem Gewicht, ohne dass
// Uebungen nach Geraetetyp klassifiziert werden muessen), gerundet auf 0,5 kg. Garantiert
// mindestens +0,5 kg, damit der Vorschlag bei leichten Gewichten nie wirkungslos verpufft.
// Schwere Grunduebungen (ex.compound: true - die klassischen "Big Lifts": Kniebeuge,
// Kreuzheben, Bankdruecken, Schulterdruecken, Klimmzuege, Langhantelrudern) bekommen 5%
// statt 2,5%, da sie typischerweise groessere Progressionsschritte vertragen.
const PROGRESSION_PCT_DEFAULT = 0.025;
const PROGRESSION_PCT_COMPOUND = 0.05;
function computeSuggestedWeight(weight, isCompound) {
  const pct = isCompound ? PROGRESSION_PCT_COMPOUND : PROGRESSION_PCT_DEFAULT;
  const raw = weight * (1 + pct);
  let rounded = Math.round(raw / 0.5) * 0.5;
  if (rounded <= weight) rounded = weight + 0.5;
  return rounded;
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        currentDay: parsed.currentDay || "pushA",
        sessions: parsed.sessions || {},
        history: parsed.history || {},
        swaps: parsed.swaps || {},
        notes: parsed.notes || {},
        lastWeights: parsed.lastWeights || {},
        theme: parsed.theme || "sepia",
        // Seit v1.48.1: kein Plan-Default mehr ("ppl") - ein neuer Nutzer soll explizit waehlen
        // statt stillschweigend PPL aktiviert zu bekommen. null bedeutet "noch nichts gewaehlt" -
        // render() zeigt dafuer einen eigenen Platzhalter-Hinweis statt der Kartenansicht.
        currentPlan: parsed.currentPlan || null,
        textSize: parsed.textSize || "normal",
        gyms: parsed.gyms || [],
        currentGymId: parsed.currentGymId || null,
        gymLastWeights: parsed.gymLastWeights || {},
        gymHistory: parsed.gymHistory || {},
        journal: parsed.journal || [],
        customPlans: parsed.customPlans || [],
        planDraft: parsed.planDraft || null,
        weightSuggestions: parsed.weightSuggestions || {},
        gymWeightSuggestions: parsed.gymWeightSuggestions || {},
        updatedAt: parsed.updatedAt || null,
        physio: parsed.physio || { exercises: [], intervalDays: 2, lastDoneAt: null },
        extraExercises: parsed.extraExercises || {},
      };
    }
  } catch (e) { /* ignore */ }
  return { currentDay: "pushA", sessions: {}, history: {}, swaps: {}, notes: {}, lastWeights: {}, theme: "sepia", currentPlan: null, textSize: "normal", gyms: [], currentGymId: null, gymLastWeights: {}, gymHistory: {}, journal: [], customPlans: [], planDraft: null, weightSuggestions: {}, gymWeightSuggestions: {}, updatedAt: null, physio: { exercises: [], intervalDays: 2, lastDoneAt: null }, extraExercises: {} };
}

// ---------- REST TIMER ----------
// Seit v1.35.0: unterschiedliche Standard-Pausenzeit je nach Uebungsart (Grunduebungen brauchen
// laut gaengiger Trainingswissenschaft laengere Satzpausen als Isolationsuebungen, ca. 2-3 statt
// 1-1.5 Minuten). restTimer.duration bleibt der aktuelle/zuletzt genutzte Wert (weiterhin per
// +15s/-15s anpassbar); REST_DURATION_COMPOUND/REST_DURATION_DEFAULT sind nur die Ausgangswerte,
// die startRestTimer() beim naechsten Satz-Abhaken je nach ex.compound waehlt.
const REST_DURATION_COMPOUND = 150;
const REST_DURATION_DEFAULT = 90;
const restTimer = { endsAt: null, duration: REST_DURATION_DEFAULT, intervalId: null };

function beep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start();
    osc.stop(ctx.currentTime + 0.6);
  } catch (e) { /* Audio nicht verfügbar */ }
}

function renderRestTimer() {
  const bar = document.getElementById("rest-timer-bar");
  const timeEl = document.getElementById("rest-timer-time");
  if (!bar || !timeEl) return;
  if (!restTimer.endsAt) {
    bar.classList.add("hidden");
    return;
  }
  const remainingMs = restTimer.endsAt - Date.now();
  if (remainingMs <= 0) {
    stopRestTimer();
    beep();
    if (navigator.vibrate) navigator.vibrate(200);
    return;
  }
  bar.classList.remove("hidden");
  const remainingSec = Math.ceil(remainingMs / 1000);
  const mm = String(Math.floor(remainingSec / 60)).padStart(2, "0");
  const ss = String(remainingSec % 60).padStart(2, "0");
  timeEl.textContent = `${mm}:${ss}`;
}

function startRestTimer(seconds = restTimer.duration) {
  restTimer.endsAt = Date.now() + seconds * 1000;
  renderRestTimer();
  if (restTimer.intervalId) clearInterval(restTimer.intervalId);
  restTimer.intervalId = setInterval(renderRestTimer, 250);
}

function adjustRestTimer(deltaSeconds) {
  if (!restTimer.endsAt) return;
  restTimer.endsAt += deltaSeconds * 1000;
  renderRestTimer();
}

function stopRestTimer() {
  restTimer.endsAt = null;
  if (restTimer.intervalId) clearInterval(restTimer.intervalId);
  restTimer.intervalId = null;
  renderRestTimer();
}

// ---------- KI-ÜBUNGSTAUSCH-DIALOG (via Cloudflare-Worker-Proxy) ----------
// Seit v1.49.0: statt einer einmaligen statischen Liste ein echter Mehrfach-Runden-Dialog (kann
// z.B. "Knie zwickt bei Kniebeugen" tippen und bekommt gezielte Vorschläge) - gleiche
// Chat-Infrastruktur wie der KI-Trainingsplan-Chat (systemInstruction + contents-Verlauf), aber
// eingebettet im bestehenden ⟲-Panel statt eines eigenen Vollbild-Screens, da an eine einzelne
// Übung gebunden. Flüchtiger State, nicht in localStorage:
// { [swapKey]: { messages: [{role:'user'|'model'|'error', text, suggestions?}], sending: bool } }
const aiSwapChats = {};

function aiSuggestHTML(day, ex, swapKey) {
  if (!PROXY_URL) {
    return `<div class="ai-suggest-panel"><span class="ai-suggest-status">KI-Vorschläge noch nicht konfiguriert (PROXY_URL fehlt).</span></div>`;
  }
  // Seit v1.48.0: KI-Funktionen brauchen ein eingeloggtes Konto (Kosten pro Gemini-Aufruf,
  // soll nicht jeder anonyme Besucher der oeffentlichen Seite nutzen koennen) - serverseitig
  // durchgesetzt (siehe Worker), hier nur die frueh sichtbare Nutzer-Erklaerung dazu.
  if (!currentUser) {
    return `<div class="ai-suggest-panel"><span class="ai-suggest-status">Bitte einloggen (Profil → Konto), um KI-Vorschläge zu nutzen.</span></div>`;
  }
  const entry = aiSwapChats[swapKey];

  if (!entry) {
    return `
      <div class="ai-suggest-panel">

  }

  const messagesHTML = entry.messages.map(m => {
    if (m.role === "error") return `<div class="chat-message error">${escapeAttr(m.text)}</div>`;
    const suggestionsHTML = m.suggestions && m.suggestions.length
      ? m.suggestions.map(s => `
          <button class="ai-opt-btn" data-role="swap-select" data-day="${day}" data-exid="${ex.id}" data-alt="${escapeAttr(s.name)}">
            ${escapeAttr(s.name)}

        `).join("")
      : "";
    return `<div class="chat-message ${escapeAttr(m.role)}">${escapeAttr(m.text)}</div>${suggestionsHTML}`;
  }).join("");
  const loadingHTML = entry.sending ? `<div class="chat-message model">…</div>` : "";

  return `
    <div class="ai-suggest-panel">
      <div class="chat-messages">
        ${messagesHTML}
        ${loadingHTML}
      </div>

// Startet einen neuen Dialog (bisheriges "ein Klick = generische Vorschläge"-Verhalten bleibt
// erhalten, die erste Nutzer-Nachricht ist eine feste Eröffnungsfrage). findExerciseById() statt
// EXERCISES[day].find() - fixt nebenbei einen bestehenden Bug: fuer Extra-Uebungen
// (state.extraExercises, seit v1.43.0 auch im Swap-Panel erreichbar) lieferte EXERCISES[day].find
// undefined und der Klick waere gecrasht.
function startAiSwapChat(day, exId) {
  const swapKey = `${day}:${exId}`;
  aiSwapChats[swapKey] = { messages: [{ role: "user", text: "Schlag mir Alternativen vor." }], sending: true };
  render();
  runSwapChatTurn(day, exId);
}

function sendAiSwapChatMessage(day, exId, text) {
  const swapKey = `${day}:${exId}`;
  const entry = aiSwapChats[swapKey];
  if (!entry || entry.sending) return;
  entry.messages.push({ role: "user", text });
  entry.sending = true;
  render();
  runSwapChatTurn(day, exId);
}

function resetAiSwapChat(day, exId) {
  delete aiSwapChats[`${day}:${exId}`];
  render();
}

async function runSwapChatTurn(day, exId) {
  const ex = findExerciseById(day, exId);
  const swapKey = `${day}:${exId}`;
  const dayMeta = DAYS.find(d => d.id === day);
  const entry = aiSwapChats[swapKey];

  const controller = new AbortController();
  const timeoutId = setTimeout(() => controller.abort(), 25000);
  try {
    // Seit v1.48.0: Login-Pflicht (siehe aiSuggestHTML/Worker) - hier trotzdem defensiv
    // geprueft, falls dieser Pfad je ohne das UI-Gate erreicht wird.
    const idToken = currentUser && window.FretzeCloud ? await window.FretzeCloud.getIdToken() : null;
    if (!idToken) throw new Error("Bitte einloggen, um KI-Vorschläge zu nutzen.");
    const res = await fetch(SWAP_CHAT_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${idToken}` },
      body: JSON.stringify({
        messages: entry.messages,
        exercise: state.swaps[swapKey] || ex.name,
        muscleFocus: dayMeta.sub,
        existingAlts: ex.alts,
      }),
      signal: controller.signal,
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `Server-Fehler (${res.status})`);
    entry.messages.push({ role: "model", text: data.reply, suggestions: data.suggestions || [] });
  } catch (e) {
    entry.messages.push({ role: "error", text: e.name === "AbortError" ? "Zeitüberschreitung" : (e.message || "Da ist etwas schiefgelaufen.") });
  } finally {
    clearTimeout(timeoutId);
    entry.sending = false;
    render();
  }
}

function persist() {
  state.updatedAt = Date.now();
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) {
      console.error("Speichern fehlgeschlagen", e);
    }
    if (currentUser && window.FretzeCloud) {
      setCloudSyncStatus("syncing");
      window.FretzeCloud.saveState(currentUser.uid, state)
        .then(() => setCloudSyncStatus("synced"))
        .catch(() => setCloudSyncStatus("error"));
    }
  }, 300);
}

// Fuehrt zwei Tagebuch-Arrays konfliktfrei zusammen (Dedupe per timestamp, chronologisch
// sortiert) - state.journal ist ein anhaengendes Array, daher verlustfrei vereinbar, anders
// als die uebrigen state-Felder (siehe reconcileCloudState).
function mergeJournals(a, b) {
  const map = new Map();
  [...(a || []), ...(b || [])].forEach((entry) => {
    if (entry && entry.timestamp != null) map.set(entry.timestamp, entry);
  });
  return Array.from(map.values()).sort((x, y) => x.timestamp - y.timestamp);
}

// Synchronisiert state mit Firestore bei jedem Login und bei jedem Reload mit bereits
// bestehender Firebase-Session (derselbe fretzecloud-ready/onAuthChange-Callback deckt beide
// Faelle ab). state.journal wird ueber beide Geraete zusammengefuehrt (siehe mergeJournals,
// Nutzerentscheidung: Trainingsdaten sollen nie stillschweigend verloren gehen). Alle anderen
// Felder folgen einfachem Last-Write-Wins nach updatedAt - bewusst keine Feld-fuer-Feld-Merge,
// gleiche "state als ein Blob"-Konvention wie ueberall sonst in der App.
async function reconcileCloudState(uid) {
  if (!window.FretzeCloud) return;
  setCloudSyncStatus("syncing");
  try {
    const cloud = await window.FretzeCloud.loadState(uid);
    if (!cloud) {
      // Kein Cloud-Dokument -> erster Login auf diesem Konto: lokalen Stand hochladen.
      // Deckt zugleich "bestehende lokale Daten beim ersten Login migrieren" ab.
      state.updatedAt = state.updatedAt || Date.now();
      await window.FretzeCloud.saveState(uid, state);
      setCloudSyncStatus("synced");
      return;
    }
    const localTs = state.updatedAt || 0;
    const cloudTs = cloud.updatedAt || 0;
    const mergedJournal = mergeJournals(state.journal, cloud.journal);
    if (cloudTs > localTs) {
      state = {
        currentDay: cloud.currentDay || "pushA",
        sessions: cloud.sessions || {},
        history: cloud.history || {},
        swaps: cloud.swaps || {},
        notes: cloud.notes || {},
        lastWeights: cloud.lastWeights || {},
        theme: cloud.theme || "sepia",
        // Seit v1.48.1 duerfen neue Nutzer keinen stillschweigenden PPL-Default bekommen (siehe
        // loadState()) - dieser Zweig hatte den alten "ppl"-Fallback beim Cloud-Merge uebersehen.
        currentPlan: cloud.currentPlan || null,
        textSize: cloud.textSize || "normal",
        gyms: cloud.gyms || [],
        currentGymId: cloud.currentGymId || null,
        gymLastWeights: cloud.gymLastWeights || {},
        gymHistory: cloud.gymHistory || {},
        journal: mergedJournal,
        customPlans: cloud.customPlans || [],
        planDraft: cloud.planDraft || null,
        weightSuggestions: cloud.weightSuggestions || {},
        gymWeightSuggestions: cloud.gymWeightSuggestions || {},
        updatedAt: cloudTs,
      };
      applyPlan(state.currentPlan);
      if (!DAYS.find((d) => d.id === state.currentDay)) state.currentDay = DAYS[0].id;
      render();
    } else {
      state.journal = mergedJournal;
    }
    // Zusammengefuehrtes Tagebuch immer zurueckschreiben, unabhaengig davon wer "gewonnen" hat -
    // sonst wuerde die andere Seite ihre eigenen, dem Gewinner unbekannten Eintraege verlieren.
    await window.FretzeCloud.saveState(uid, state);
    setCloudSyncStatus("synced");
  } catch (e) {
    console.warn("Cloud-Sync fehlgeschlagen", e);
    setCloudSyncStatus("error");
  }
}

function getSetsFor(dayId, ex) {
  const day = state.sessions[dayId];
  if (day && day[ex.id] && day[ex.id].length === ex.sets) return day[ex.id];
  return buildInitialSets(dayId, ex, ex.sets);
}

function ensureDaySets(dayId, ex) {
  if (!state.sessions[dayId]) state.sessions[dayId] = {};
  if (!state.sessions[dayId][ex.id] || state.sessions[dayId][ex.id].length !== ex.sets) {
    state.sessions[dayId][ex.id] = buildInitialSets(dayId, ex, ex.sets);
  }
  return state.sessions[dayId][ex.id];
}

// Loest eine Uebungs-Definition anhand von day/exId auf - anders als getSetsFor/ensureDaySets
// (die ein fertiges ex-Objekt entgegennehmen) muessen die Satz-Click-/Input-Handler das
// ex-Objekt selbst erst nachschlagen. EXERCISES ist nur nach echten Plan-Tag-IDs geschluesselt,
// daher der Sonderfall fuer den reservierten Physio-Pseudo-Tag (state.physio.exercises statt
// EXERCISES["physio"], das es nicht gibt) - seit v1.42.0.
function findExerciseById(day, exId) {
  if (day === PHYSIO_DAY_ID) return state.physio.exercises.find(x => x.id === exId);
  const inPlan = EXERCISES[day].find(x => x.id === exId);
  if (inPlan) return inPlan;
  // Seit v1.43.0: frei zum Tag hinzugefuegte Extra-Uebungen sind nicht Teil von EXERCISES[day].
  return (state.extraExercises[day] || []).find(x => x.id === exId);
}

function tallyHTML(count) {
  if (count === 0) return '<span style="color: var(--chalk-dim); font-size: 13px;">—</span>';
  const groups = [];
  let remaining = count;
  while (remaining > 0) {
    const g = Math.min(5, remaining);
    groups.push(g);
    remaining -= g;
  }
  return '<span class="tally">' + groups.map(g => {
    let strokes = "";
    for (let i = 0; i < g; i++) strokes += '<span class="tally-stroke"></span>';
    const slash = g === 5 ? '<span class="tally-slash"></span>' : "";
    return `<span class="tally-group">${strokes}${slash}</span>`;
  }).join("") + '</span>';
}

function escapeAttr(str) {
  return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;");
}

const TEXT_SIZES = ["normal", "gross", "xgross"];
function nextTextSize(size) {
  const idx = TEXT_SIZES.indexOf(size);
  return TEXT_SIZES[(idx + 1) % TEXT_SIZES.length];
}
function textSizeLabel(size) {
  return { normal: "Aa ●○○", gross: "Aa ●●○", xgross: "Aa ●●●" }[size] || "Aa ●○○";
}

// Platzhalter fuer die kuenftige Login-Funktion: sobald sich Nutzer anmelden koennen, soll
// hier "${Vorname}s Trainingsbuch" (bzw. ohne zusaetzliches "s" bei Namen, die schon auf
// s/x/z enden, z.B. "Tobias Trainingsbuch") stehen statt des generischen Textes.
// Deutsche Genitiv-Bildung: Namen, die bereits auf s/x/z enden, bekommen kein zusaetzliches
// "s" (z.B. "Tobias" bleibt "Tobias", statt des falschen "Tobiass") - alle anderen Namen
// bekommen ein einfaches "s" ohne Apostroph angehaengt (z.B. "Frederik" -> "Fredericks").
function possessiveName(name) {
  if (!name) return null;
  return /[sxz]$/i.test(name) ? name : `${name}s`;
}

function headerSubtitleText() {
  if (currentUser && currentUser.displayName) {
    return `${possessiveName(currentUser.displayName)} Trainingsbuch`;
  }
  return "Trainingsbuch";
}

// Seit v1.57.0: statt eines separat gepflegten state.lastCompletedDay/-Date-Feldes (das durch den
// v1.55.0-Bug bereits verwaisen konnte und dann bis zum naechsten Abschluss falsch blieb - kein
// neuer Abschluss = keine Selbstheilung) wird die "zuletzt abgeschlossene" Info jetzt bei jedem
// Rendern direkt aus state.journal abgeleitet: der Eintrag mit dem hoechsten timestamp fuer den
// aktiven Plan. Damit gibt es keinen zweiten, potenziell veraltenden Speicherort mehr - jede
// Anzeige ist automatisch konsistent mit dem tatsaechlichen Tagebuch, auch rueckwirkend fuer
// bereits bestehende, ggf. verwaiste Installationen.
function getLastJournalEntryForCurrentPlan() {
  const entries = state.journal.filter(e => e.planId === state.currentPlan);
  if (entries.length === 0) return null;
  return entries.reduce((a, b) => (b.timestamp > a.timestamp ? b : a));
}

function getRecommendedDay() {
  const lastEntry = getLastJournalEntryForCurrentPlan();
  if (!lastEntry) return DAYS[0].id;
  const idx = DAYS.findIndex(d => d.id === lastEntry.dayId);
  if (idx === -1) return DAYS[0].id;
  return DAYS[(idx + 1) % DAYS.length].id;
}

function renderTodayBanner() {
  const today = new Date().toLocaleDateString("de-DE");
  const lastEntry = getLastJournalEntryForCurrentPlan();
  const lastDayMeta = lastEntry ? DAYS.find(d => d.id === lastEntry.dayId) : null;
  // lastDayMeta kann fehlen, wenn zuletzt in einem anderen Plan trainiert wurde (der
  // abgeschlossene Tag gehoert dann nicht zum gerade aktiven Plan) - dann gilt "heute
  // schon trainiert" nicht fuer die aktuelle Rotation.
  const trainedToday = !!lastEntry && lastEntry.date === today && !!lastDayMeta;
  const recDay = getRecommendedDay();
  const recLabel = DAYS.find(d => d.id === recDay).label;

  if (trainedToday) {
    const lastLabel = lastDayMeta.label;
    return `
      <div class="today-banner done-today">
        <div class="today-banner-text">✅ Heute schon trainiert: <b>${lastLabel}</b>. Nächstes Mal: <b>${recLabel}</b></div>
        <button class="today-banner-btn" data-role="day-tab" data-day="${recDay}">Zu ${recLabel}</button>
      </div>
    `;
  }
  return `
    <div class="today-banner">
      <div class="today-banner-text">📅 Heute dran: <b>${recLabel}</b></div>
      <button class="today-banner-btn" data-role="day-tab" data-day="${recDay}">Los geht's</button>
    </div>
  `;
}

// Geteilt zwischen Kartenansicht und Fokusmodus, damit beide Ansichten nie auseinanderdriften.
// editMode (seit v1.41.0): erledigte Saetze (s.done) zeigen ihr Gewicht/Wdh. standardmaessig nur
// noch als reinen Text statt als Eingabefelder - waehrend des Trainings tippt man versehentlich
// leicht in schon eingetragene Kaestchen hinein. Das Stift-Symbol im Kartenkopf (data-role
// "edit-toggle"/"focus-edit-toggle") schaltet editMode fuer die ganze Uebung wieder frei, damit
// bereits erledigte Saetze nachtraeglich korrigiert werden koennen. Gewichtsfeld ist bewusst
// type="text" statt type="number" (siehe parseWeightNum oben) - deutsche Komma-Dezimalen wie
// "12,5" liessen sich in type="number" auf manchen mobilen Browsern nach dem Komma nicht mehr
// weitertippen.
function setsRowsHTML(day, ex, sets, editMode) {
  const rowsHTML = sets.map((s, i) => {
    const locked = s.done && !editMode;
    const weightCell = locked
      ? `<span class="set-value">${escapeAttr(s.weight) || "–"}</span>`
      : `<input class="set-input" type="text" inputmode="decimal" placeholder="0"
          value="${escapeAttr(s.weight)}" data-role="set-field" data-day="${day}" data-exid="${ex.id}" data-idx="${i}" data-field="weight" />`;
    const repsCell = locked
      ? `<span class="set-value">${escapeAttr(s.reps) || "–"}</span>`
      : `<input class="set-input" type="number" inputmode="numeric" placeholder="0"
          value="${s.reps}" data-role="set-field" data-day="${day}" data-exid="${ex.id}" data-idx="${i}" data-field="reps" />`;
    return `
    <div class="set-row">
      <span class="set-idx">${i + 1}</span>
      ${weightCell}
      ${repsCell}
      <button class="couldmore-toggle ${s.couldDoMore ? "active" : ""}" data-role="set-couldmore-toggle" data-day="${day}" data-exid="${ex.id}" data-idx="${i}" title="${s.couldDoMore ? "Mehr Wdh. wären möglich gewesen (antippen zum Umschalten)" : "Wären mehr Wdh. möglich gewesen?"}">↑</button>
      <button class="done-btn ${s.done ? "done" : ""}" data-role="set-done" data-day="${day}" data-exid="${ex.id}" data-idx="${i}">${s.done ? "✓" : ""}</button>
    </div>
  `;
  }).join("");

  return `
    <div class="set-header">
      <span>#</span><span>kg</span><span>Wdh.</span><span class="set-header-icon" title="Mehr Wdh. möglich gewesen?">↑</span><span></span>
    </div>
    ${rowsHTML}
  `;
}
